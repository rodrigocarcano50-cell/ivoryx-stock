  <!-- Sidebar -->
  <aside id="sidebar" class="hidden md:flex md:flex-col w-64 bg-ivory-900 text-white shrink-0">

            <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>

<!-- Toast root -->

<script>
// =====================================================================
//  IVORYX · MVP single-file app
//  Persistencia: localStorage   ·   Stack futuro: React + Node + SQLite
// =====================================================================

const STORAGE_KEY = 'ivoryx.v1';
const CFG_KEY = 'ivoryx.supabase';
const CATEGORIES = ['Fundas','Celulares','Templados','Cargadores','Auriculares','Bolsas','Tarjetas','Otros'];
const COLOR_CATEGORIES = new Set(['Fundas','Celulares']);

// ---------------- Supabase ----------------
let supa = null;
let cloudReady = false;

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch { return null; }
}
function saveCfg(cfg) { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function clearCfg() { localStorage.removeItem(CFG_KEY); }

function initSupabase() {
  const cfg = loadCfg();
  if (!cfg?.url || !cfg?.key || !window.supabase) { supa = null; cloudReady = false; return false; }
  supa = window.supabase.createClient(cfg.url, cfg.key);
  cloudReady = true;
  return true;
}

const rowToProduct = r => ({
  id: r.id, name: r.name, category: r.category, model: r.model || '', color: r.color || '',
  sku: r.sku || '', stock: r.stock, buyPrice: r.buy_price, sellPrice: r.sell_price,
  battery: r.battery ?? null,
  createdAt: r.created_at,
});
const productToRow = p => ({
  id: p.id, name: p.name, category: p.category, model: p.model || null, color: p.color || null,
  sku: p.sku || null, stock: p.stock, buy_price: p.buyPrice, sell_price: p.sellPrice,
  battery: p.battery ?? null,
  created_at: p.createdAt,
});
const rowToMov = r => ({
  id: r.id, productId: r.product_id, type: r.type, qty: r.qty,
  unitCost: r.unit_cost, unitPrice: r.unit_price, date: r.date, note: r.note || '',
  customerId: r.customer_id || null,
});
const movToRow = m => ({
  id: m.id, product_id: m.productId, type: m.type, qty: m.qty,
  unit_cost: m.unitCost ?? null, unit_price: m.unitPrice ?? null, date: m.date, note: m.note || null,
  customer_id: m.customerId || null,
});
const rowToCustomer = r => ({
  id: r.id, firstName: r.first_name || '', lastName: r.last_name || '', phone: r.phone || '',
  createdAt: r.created_at,
});
const customerToRow = c => ({
  id: c.id, first_name: c.firstName || null, last_name: c.lastName || null,
  phone: c.phone || null, created_at: c.createdAt,
});

async function cloudLoad() {
  if (!cloudReady) return null;
  const [p, m, c] = await Promise.all([
    supa.from('products').select('*').order('created_at'),
    supa.from('movements').select('*').order('date', { ascending: false }),
    supa.from('customers').select('*').order('created_at'),
  ]);
  if (p.error) throw p.error;
  if (m.error) throw m.error;
  if (c.error && c.error.code !== '42P01') throw c.error; // tabla puede no existir aún
  return {
    products: p.data.map(rowToProduct),
    movements: m.data.map(rowToMov),
    customers: (c.data || []).map(rowToCustomer),
  };
}
async function cloudUpsertCustomer(c) {
  if (!cloudReady) return;
  const { error } = await supa.from('customers').upsert(customerToRow(c));
  if (error) throw error;
}
async function cloudDeleteCustomer(id) {
  if (!cloudReady) return;
  await supa.from('movements').update({ customer_id: null }).eq('customer_id', id);
  const { error } = await supa.from('customers').delete().eq('id', id);
  if (error) throw error;
}
async function cloudUpsertProduct(p) {
  if (!cloudReady) return;
  const { error } = await supa.from('products').upsert(productToRow(p));
  if (error) throw error;
}
async function cloudDeleteProduct(id) {
  if (!cloudReady) return;
  // borra movimientos asociados primero para no romper FK
  await supa.from('movements').delete().eq('product_id', id);
  const { error } = await supa.from('products').delete().eq('id', id);
  if (error) throw error;
}
async function cloudInsertMovement(m) {
  if (!cloudReady) return;
  const { error } = await supa.from('movements').insert(movToRow(m));
  if (error) throw error;
}

// ---------- Estado ----------
const defaultState = () => ({
  products: [],     // {id,name,category,model,color,stock,buyPrice,sellPrice,sku,createdAt}
  movements: [],    // {id,type:'in'|'out'|'adj',productId,qty,unitCost,unitPrice,date,note,customerId}
  customers: [],    // {id,firstName,lastName,phone,createdAt}
  settings: {
    theme: 'light',
    currency: 'ARS',
    lowStock: 5,
    criticalStock: 2,
    business: 'Ivoryx',
  },
});

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seed(defaultState());
    const s = JSON.parse(raw);
    return { ...defaultState(), ...s, customers: s.customers||[], settings: { ...defaultState().settings, ...(s.settings||{}) } };
  } catch { return seed(defaultState()); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

function seed(s) {
  const now = new Date().toISOString();
  const demo = [
    ['Funda Silicona','Fundas','iPhone 13','Negro',6,5000,10000],
    ['Funda Silicona','Fundas','iPhone 13','Azul',3,5000,10000],
    ['Funda Silicona','Fundas','iPhone 13','Rosa',3,5000,10000],
    ['Funda MagSafe','Fundas','iPhone 14 Pro','Negro',5,5500,11000],
    ['Funda MagSafe','Fundas','iPhone 14 Pro','Blanco',3,5500,11000],
    ['Funda Transparente','Fundas','iPhone 15 Pro Max','Transparente',4,6000,12500],
    ['Vidrio 9H','Templados','iPhone 13','',20,1200,3500],
    ['Vidrio Privacidad','Templados','iPhone 15','',6,1800,4500],
    ['Cargador 20W USB-C','Cargadores','Universal','',10,3500,7500],
    ['Auricular cable','Auriculares','Universal','',1,1500,3500],
    ['Bolsa kraft chica','Bolsas','—','',50,80,250],
    ['Tarjeta agradecimiento','Tarjetas','—','',100,50,0],
  ];
  s.products = demo.map(([name,category,model,color,stock,buyPrice,sellPrice]) => ({
    id: uid(), name, category, model, color, stock, buyPrice, sellPrice,
    sku: '', createdAt: now,
  }));
  return s;
}

// Paleta sugerida para fundas — el usuario puede tipear cualquier color libre
const COLOR_PRESETS = [
  ['Negro','#111827'], ['Blanco','#F8FAFC'], ['Transparente','transparent'],
  ['Azul','#2563EB'], ['Celeste','#38BDF8'], ['Rojo','#DC2626'],
  ['Rosa','#EC4899'], ['Violeta','#7C3AED'], ['Verde','#16A34A'],
  ['Amarillo','#FACC15'], ['Naranja','#F97316'], ['Gris','#6B7280'],
  ['Beige','#E7D7B1'], ['Dorado','#D4AF37'], ['Plateado','#C0C0C0'],
];
function colorHex(name) {
  const hit = COLOR_PRESETS.find(([n]) => n.toLowerCase() === (name||'').toLowerCase());
  return hit ? hit[1] : null;
}
function colorChip(name) {
  if (!name) return '<span class="text-slate-400">—</span>';
  const hex = colorHex(name) || '#94a3b8';
  const border = (hex === 'transparent' || hex.toLowerCase() === '#f8fafc') ? 'border border-slate-300' : '';
  const bg = hex === 'transparent'
    ? 'background:repeating-conic-gradient(#cbd5e1 0 25%,transparent 0 50%) 50%/8px 8px;'
    : `background:${hex};`;
  return `<span class="inline-flex items-center gap-1.5">
    <span class="w-3.5 h-3.5 rounded-full ${border}" style="${bg}"></span>
    ${escapeHtml(name)}
  </span>`;
}

function batteryChip(pct) {
  if (pct === null || pct === undefined || pct === '') return '<span class="text-slate-400">—</span>';
  const n = Math.max(0, Math.min(100, Number(pct)));
  const color = n >= 80 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300'
              : n >= 50 ? 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300'
              : 'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-300';
  return `<span class="px-2 py-0.5 text-xs rounded-full font-semibold ${color}">${n}%</span>`;
}

// ---------- Utils ----------
const fmt = new Intl.NumberFormat('es-AR',{ style:'currency', currency:'ARS', maximumFractionDigits:0 });
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const escapeHtml = (s='') => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, kind='ok') {
  const colors = { ok:'bg-emerald-600', err:'bg-rose-600', info:'bg-ivory-700' };
  const el = document.createElement('div');
  el.className = `${colors[kind]} text-white text-sm px-4 py-2 rounded-xl shadow-lg animate-[fadeIn_.2s_ease]`;
  el.textContent = msg;
  $('#toastRoot').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function todayKey(d=new Date()) { return d.toISOString().slice(0,10); }

// ---------- Routing ----------
const ROUTES = [
  { id:'dashboard', label:'Dashboard', icon:'M3 12l2-2 4 4 8-8 4 4' },
  { id:'category:Fundas', label:'Fundas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Celulares', label:'Celulares', icon:'M7 4h10a1 1 0 011 1v14a1 1 0 01-1 1H7a1 1 0 01-1-1V5a1 1 0 011-1zM11 18h2' },
  { id:'category:Templados', label:'Templados', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Cargadores', label:'Cargadores', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Auriculares', label:'Auriculares', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Bolsas', label:'Bolsas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Tarjetas', label:'Tarjetas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Otros', label:'Otros', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'customers', label:'Clientes', icon:'M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-2a4 4 0 100-8 4 4 0 000 8zm6 0a3 3 0 100-6 3 3 0 000 6z' },
  { id:'movements', label:'Movimientos', icon:'M4 6h16M4 12h16M4 18h16' },
  { id:'stats', label:'Estadísticas', icon:'M3 3v18h18M7 15l3-3 3 3 5-5' },
  { id:'settings', label:'Configuración', icon:'M12 15a3 3 0 100-6 3 3 0 000 6z' },
];

let currentRoute = 'dashboard';
function navigate(id) {
  currentRoute = id;
  render();
  history.replaceState(null, '', '#' + id);
}

function renderNav() {
  const nav = $('#nav');
  nav.innerHTML = ROUTES.map(r => `
    <button data-route="${r.id}" class="route-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left transition
      ${currentRoute===r.id ? 'bg-white/10 text-white' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${r.icon}"/></svg>
      <span>${r.label}</span>
    </button>`).join('');
  $$('#nav .route-btn').forEach(b => b.onclick = () => navigate(b.dataset.route));
}

// ---------- Stock helpers ----------
function stockLevel(p) {
  if (p.stock <= 0) return { label:'Sin stock', color:'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-300' };
  if (p.stock <= state.settings.criticalStock) return { label:'Crítico', color:'bg-orange-100 text-orange-700 dark:bg-orange-500/20 dark:text-orange-300' };
  if (p.stock <= state.settings.lowStock) return { label:'Bajo', color:'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300' };
  return { label:'OK', color:'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300' };
}

// =====================================================================
//  VIEWS
// =====================================================================

function viewDashboard() {
  const total = state.products.reduce((a,p)=>a+p.stock,0);
  const low = state.products.filter(p => p.stock>0 && p.stock<=state.settings.lowStock).length;
  const out = state.products.filter(p => p.stock<=0).length;
  const today = todayKey();
  const dayMoves = state.movements.filter(m => m.date.slice(0,10)===today);
  const sales = dayMoves.filter(m=>m.type==='out');
  const dayUnits = sales.reduce((a,m)=>a+m.qty,0);
  const dayRevenue = sales.reduce((a,m)=>a+m.qty*(m.unitPrice||0),0);
  const dayProfit = sales.reduce((a,m)=>{
    const prod = state.products.find(p=>p.id===m.productId);
    const cost = m.unitCost ?? prod?.buyPrice ?? 0;
    return a + m.qty * ((m.unitPrice||0) - cost);
  },0);
  const last = [...state.movements].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const invValue = state.products.reduce((a,p)=>a+p.stock*p.sellPrice,0);

  return `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${statCard('Productos en stock', total, 'ivory-500', 'unidades totales')}
      ${statCard('Poco stock', low, 'amber-500', `≤ ${state.settings.lowStock} unidades`)}
      ${statCard('Agotados', out, 'rose-500', 'sin stock')}
      ${statCard('Valor inventario', fmt.format(invValue), 'emerald-500', 'precio venta')}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
      ${statCard('Ventas del día', dayUnits, 'ivory-500', `${sales.length} operaciones`)}
      ${statCard('Ingresos del día', fmt.format(dayRevenue), 'ivory-500', 'facturado hoy')}
      ${statCard('Ganancia del día', fmt.format(dayProfit), 'emerald-500', 'margen estimado')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-6">
      <div class="lg:col-span-2 bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">Últimos movimientos</h3>
          <button class="text-sm text-ivory-500 hover:underline" data-go="movements">Ver todos →</button>
        </div>
        ${last.length ? `
          <div class="overflow-x-auto scrollbar-thin">
            <table class="w-full text-sm">
              <thead class="text-left text-slate-500 dark:text-slate-400">
                <tr><th class="py-2">Fecha</th><th>Tipo</th><th>Producto</th><th class="text-right">Cant.</th><th class="text-right">Importe</th></tr>
              </thead>
              <tbody>
                ${last.map(m => {
                  const p = state.products.find(pp=>pp.id===m.productId);
                  const amount = m.type==='out' ? m.qty*(m.unitPrice||0) : m.qty*(m.unitCost||0);
                  return `<tr class="border-t border-slate-100 dark:border-white/5">
                    <td class="py-2">${new Date(m.date).toLocaleString('es-AR')}</td>
                    <td>${typeBadge(m.type)}</td>
                    <td>${escapeHtml(p?.name || '—')} <span class="text-slate-400">· ${escapeHtml(p?.model||'')}</span></td>
                    <td class="text-right">${m.qty}</td>
                    <td class="text-right">${fmt.format(amount)}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>` : `<p class="text-sm text-slate-500">Aún no hay movimientos.</p>`}
      </div>

      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-3">Acciones rápidas</h3>
        <div class="space-y-2">
          <button class="w-full px-4 py-3 rounded-xl bg-ivory-500 hover:bg-ivory-700 text-white text-sm font-medium" data-action="new-sale">+ Nueva venta</button>
          <button class="w-full px-4 py-3 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm font-medium" data-action="new-inbound">+ Nuevo ingreso</button>
          <button class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm font-medium" data-action="new-product">+ Nuevo producto</button>
        </div>
        <div class="mt-5 pt-5 border-t border-slate-100 dark:border-white/5">
          <h4 class="text-sm font-semibold mb-2">Alertas</h4>
          ${renderAlerts()}
        </div>
      </div>
    </div>
  `;
}

function statCard(label, value, color, hint) {
  return `<div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
    <div class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">${label}</div>
    <div class="text-2xl md:text-3xl font-bold mt-1">${value}</div>

function renderAlerts() {
  const alerts = state.products.filter(p => p.stock<=state.settings.lowStock).sort((a,b)=>a.stock-b.stock).slice(0,6);

  return `<ul class="space-y-2 text-sm">${alerts.map(p => {
    const lvl = stockLevel(p);
    return `<li class="flex items-center justify-between gap-2">
      <span class="truncate">${escapeHtml(p.name)} <span class="text-slate-400">${escapeHtml(p.model||'')}</span></span>

// ---------- Stats ----------
function viewStats() {
  const sales = state.movements.filter(m=>m.type==='out');
  const byProduct = new Map();
  for (const m of sales) {
    const cur = byProduct.get(m.productId) || { qty:0, revenue:0, profit:0 };
    cur.qty += m.qty;
    cur.revenue += m.qty * (m.unitPrice||0);
    const p = state.products.find(pp=>pp.id===m.productId);
    const cost = m.unitCost ?? p?.buyPrice ?? 0;
    cur.profit += m.qty * ((m.unitPrice||0)-cost);
    byProduct.set(m.productId, cur);
  }
  const top = [...byProduct.entries()].map(([id,v]) => ({ p: state.products.find(pp=>pp.id===id), ...v }))
    .filter(x=>x.p).sort((a,b)=>b.qty-a.qty).slice(0,10);

  const totalProfit = sales.reduce((a,m)=>{
    const p = state.products.find(pp=>pp.id===m.productId);
    const cost = m.unitCost ?? p?.buyPrice ?? 0;
    return a + m.qty * ((m.unitPrice||0)-cost);
  },0);
  const totalRevenue = sales.reduce((a,m)=>a+m.qty*(m.unitPrice||0),0);

  // Ventas por mes
  const byMonth = new Map();
  for (const m of sales) {
    const k = m.date.slice(0,7);
    byMonth.set(k, (byMonth.get(k)||0) + m.qty*(m.unitPrice||0));
  }
  const months = [...byMonth.entries()].sort();
  const maxMonth = Math.max(1, ...months.map(([,v])=>v));

  const invValue = state.products.reduce((a,p)=>a+p.stock*p.sellPrice,0);

  return `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${statCard('Ingresos totales', fmt.format(totalRevenue), 'ivory-500', 'históricos')}
      ${statCard('Ganancia total', fmt.format(totalProfit), 'emerald-500', 'histórica')}
      ${statCard('Unidades vendidas', sales.reduce((a,m)=>a+m.qty,0), 'ivory-500', `${sales.length} operaciones`)}
      ${statCard('Valor inventario', fmt.format(invValue), 'emerald-500', 'a precio venta')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-6">
      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-4">Productos más vendidos</h3>
        ${top.length ? `<table class="w-full text-sm">
          <thead class="text-left text-slate-500 dark:text-slate-400">
            <tr><th class="py-2">Producto</th><th class="text-right">Unidades</th><th class="text-right">Ingreso</th><th class="text-right">Ganancia</th></tr>
          </thead>
          <tbody>
          ${top.map(t=>`<tr class="border-t border-slate-100 dark:border-white/5">
            <td class="py-2">${escapeHtml(t.p.name)} <span class="text-slate-400">· ${escapeHtml(t.p.model||'')}</span></td>
            <td class="text-right font-semibold">${t.qty}</td>
            <td class="text-right">${fmt.format(t.revenue)}</td>
            <td class="text-right text-emerald-600 dark:text-emerald-300">${fmt.format(t.profit)}</td>
          </tr>`).join('')}
          </tbody></table>` : `<p class="text-sm text-slate-500">Aún no hay ventas registradas.</p>`}
      </div>

      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-4">Ventas por mes</h3>
        ${months.length ? `<div class="space-y-2">
          ${months.map(([k,v])=>`
            <div>
              <div class="flex justify-between text-xs text-slate-500 mb-1"><span>${k}</span><span>${fmt.format(v)}</span></div>
              <div class="h-2 bg-slate-100 dark:bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-ivory-500 to-ivory-300" style="width:${(v/maxMonth*100).toFixed(1)}%"></div>
              </div>
            </div>`).join('')}
        </div>` : `<p class="text-sm text-slate-500">Sin datos suficientes.</p>`}
      </div>
    </div>
  `;
}

function openModal(html, onMount) {
  const root = $('#modalRoot');
  root.innerHTML = `
    <div class="fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4" id="modalBg">
      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-2xl w-full max-w-md p-6 relative" onclick="event.stopPropagation()">
        ${html}
      </div>
    </div>`;
  $('#modalBg').onclick = closeModal;
  if (onMount) onMount();
}
function closeModal() { $('#modalRoot').innerHTML = ''; }

function movementForm(type, presetProductId=null) {

  openModal(`

    <div class="space-y-3 text-sm">
      <div>
        <label class="block mb-1">Producto</label>
        <div class="relative">
          <input id="mProdSearch" autocomplete="off" placeholder="Buscar por nombre, modelo, color o SKU..." class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 focus:outline-none focus:ring-2 focus:ring-ivory-500"/>
          <input id="mProd" type="hidden" value="${presetProductId||''}"/>
          <div id="mProdList" class="hidden absolute left-0 right-0 mt-1 z-10 max-h-64 overflow-y-auto scrollbar-thin bg-white dark:bg-ivory-700 border border-slate-200 dark:border-white/10 rounded-xl shadow-lg"></div>
        </div>
        <div id="mProdPicked" class="mt-2 text-xs text-slate-500"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block mb-1">Cantidad</label>
          <input id="mQty" type="number" min="1" value="1" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
        <div>
          <label class="block mb-1">${isOut?'Precio venta unitario':'Costo unitario'}</label>
          <input id="mUnit" type="number" min="0" step="0.01" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
      </div>
      ${isOut ? `
      <div class="pt-3 border-t border-slate-200 dark:border-white/10">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-2">Cliente</div>
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block mb-1">Celular *</label>
            <input id="mPhone" autocomplete="off" placeholder="11 5555-5555" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
            <div id="mCustHint" class="text-xs text-slate-500 mt-1"></div>
          </div>
          <div>
            <label class="block mb-1">Nombre *</label>
            <input id="mFirst" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
          </div>
          <div>
            <label class="block mb-1">Apellido</label>
            <input id="mLast" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
          </div>
        </div>
      </div>` : ''}
      <div>
        <label class="block mb-1">Nota (opcional)</label>
        <input id="mNote" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
      </div>
      <div id="mPreview" class="text-xs text-slate-500"></div>
    </div>
    <div class="flex justify-end gap-2 mt-5">
      <button id="cancel" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 text-sm">Cancelar</button>
      <button id="save" class="px-4 py-2 rounded-xl ${isOut?'bg-ivory-500 hover:bg-ivory-700':'bg-ivory-900 hover:bg-ivory-800'} text-white text-sm font-medium">Registrar</button>
    </div>
  `, () => {
    const sel = $('#mProd'), unit = $('#mUnit'), qty = $('#mQty'), prev = $('#mPreview');
    const search = $('#mProdSearch'), list = $('#mProdList'), picked = $('#mProdPicked');

    const productLabel = p => `${p.name} · ${p.model||'—'}${p.color?` · ${p.color}`:''}`;

    const renderList = (q='') => {
      const needle = q.toLowerCase().trim();
      const matches = state.products
        .filter(p => !needle || (p.name+' '+p.model+' '+(p.color||'')+' '+p.category+' '+(p.sku||'')).toLowerCase().includes(needle))
        .slice(0, 40);
      if (!matches.length) {
        list.innerHTML = `<div class="px-3 py-2 text-sm text-slate-500">Sin resultados</div>`;
      } else {
        list.innerHTML = matches.map(p => `
          <button type="button" data-pid="${p.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-ivory-100 dark:hover:bg-white/10 flex items-center gap-2">
            <span class="flex-1 truncate">
              <span class="font-medium">${escapeHtml(p.name)}</span>
              <span class="text-slate-500"> · ${escapeHtml(p.model||'—')}</span>
              ${p.color ? ` · ${colorChip(p.color)}` : ''}
            </span>
            <span class="text-xs ${p.stock<=0?'text-rose-500':p.stock<=state.settings.lowStock?'text-amber-500':'text-slate-400'}">stock ${p.stock}</span>
          </button>`).join('');
        list.querySelectorAll('[data-pid]').forEach(b => b.onclick = () => pick(b.dataset.pid));
      }
      list.classList.remove('hidden');
    };

    const pick = (id) => {
      const p = state.products.find(x => x.id === id);
      if (!p) return;
      sel.value = id;
      search.value = productLabel(p);
      picked.innerHTML = `Stock actual: <b>${p.stock}</b> · P. compra ${fmt.format(p.buyPrice)} · P. venta ${fmt.format(p.sellPrice)}`;
      list.classList.add('hidden');
      updateUnit();
    };

    function updateUnit() {
      const p = state.products.find(x=>x.id===sel.value);
      if (!p) return;
      unit.value = isOut ? p.sellPrice : p.buyPrice;
      refresh();
    }

    function refresh() {
      const p = state.products.find(x=>x.id===sel.value);
      const q = parseInt(qty.value)||0;
      const u = parseFloat(unit.value)||0;
      if (!p) { prev.textContent=''; return; }
      if (isOut) {
        const profit = (u - p.buyPrice) * q;
        prev.innerHTML = `Total: <b>${fmt.format(u*q)}</b> · Ganancia estimada: <b class="text-emerald-600">${fmt.format(profit)}</b> · Stock disponible: ${p.stock}`;
      } else {
        prev.innerHTML = `Total compra: <b>${fmt.format(u*q)}</b> · Stock resultante: ${p.stock + q}`;
      }
    }
    qty.oninput = refresh; unit.oninput = refresh;

    search.oninput = () => { sel.value=''; renderList(search.value); };
    search.onfocus = () => renderList(search.value);
    document.addEventListener('mousedown', (e) => {
      if (!list.contains(e.target) && e.target !== search) list.classList.add('hidden');
    });

    if (presetProductId) pick(presetProductId);
    else setTimeout(() => search.focus(), 50);

    if (isOut) {
      const phone = $('#mPhone'), first = $('#mFirst'), last = $('#mLast'), hint = $('#mCustHint');
      phone.oninput = () => {
        const v = phone.value.trim();
        if (!v) { hint.textContent=''; return; }
        const found = state.customers.find(c => c.phone === v);
        if (found) {
          first.value = found.firstName;
          last.value = found.lastName;
          hint.innerHTML = `<span class="text-emerald-600">Cliente existente: ${escapeHtml(found.firstName)} ${escapeHtml(found.lastName)}</span>`;
        } else {
          hint.innerHTML = `<span class="text-slate-500">Cliente nuevo — se creará al guardar.</span>`;
        }
      };
    }
    $('#cancel').onclick = closeModal;
    $('#save').onclick = () => {
      const p = state.products.find(x=>x.id===sel.value);
      if (!p) return toast('Seleccioná un producto','err');
      const q = parseInt(qty.value)||0;
      const u = parseFloat(unit.value)||0;
      if (q<=0) return toast('Cantidad inválida','err');
      if (isOut && q > p.stock) return toast('Stock insuficiente','err');

      let customer = null;
      if (isOut) {
        const phone = $('#mPhone').value.trim();
        const first = $('#mFirst').value.trim();
        const lastN = $('#mLast').value.trim();
        if (!phone) return toast('El celular del cliente es obligatorio','err');
        if (!first) return toast('El nombre del cliente es obligatorio','err');
        customer = state.customers.find(c => c.phone === phone);
        if (customer) {
          if (first && first !== customer.firstName) customer.firstName = first;
          if (lastN && lastN !== customer.lastName) customer.lastName = lastN;
        } else {
          customer = { id: uid(), firstName: first, lastName: lastN, phone, createdAt: new Date().toISOString() };
          state.customers.push(customer);
        }
      }

      const mov = { id: uid(), type, productId:p.id, qty:q, date: new Date().toISOString(), note: $('#mNote').value.trim() };
      if (isOut) { mov.unitPrice = u; mov.unitCost = p.buyPrice; mov.customerId = customer.id; p.stock -= q; }
      else { mov.unitCost = u; p.buyPrice = u || p.buyPrice; p.stock += q; }
      state.movements.push(mov);
      save(); closeModal(); render(); toast(isOut?'Venta registrada':'Ingreso registrado');
      if (cloudReady) {
        const ops = [cloudInsertMovement(mov), cloudUpsertProduct(p)];
        if (customer) ops.push(cloudUpsertCustomer(customer));
        Promise.all(ops).catch(e => toast('Error nube: '+e.message,'err'));
      }
    };
  });
}

function addStockForm(productId) {
  const p = state.products.find(x=>x.id===productId);
  if (!p) return;
  movementForm('in', productId);
}

// =====================================================================
//  Export / Import
// =====================================================================
function downloadFile(name, content, type='text/plain') {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function toCSV(rows) {
  return rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
}
function exportCategory(cat) {
  const items = state.products.filter(p=>p.category===cat);
  const rows = [['nombre','categoria','modelo','color','stock','precio_compra','precio_venta','sku']];
  items.forEach(p => rows.push([p.name,p.category,p.model,p.color||'',p.stock,p.buyPrice,p.sellPrice,p.sku]));
  downloadFile(`ivoryx-${cat.toLowerCase()}.csv`, toCSV(rows), 'text/csv');
}
function exportMovements() {
  const rows = [['fecha','tipo','producto','categoria','modelo','cantidad','unitario','total','nota']];
  state.movements.forEach(m => {
    const p = state.products.find(pp=>pp.id===m.productId);
    const unit = m.type==='out' ? (m.unitPrice||0) : (m.unitCost||0);
    rows.push([m.date, m.type, p?.name||'', p?.category||'', p?.model||'', m.qty, unit, unit*m.qty, m.note||'']);
  });
  downloadFile('ivoryx-movimientos.csv', toCSV(rows), 'text/csv');
}
function backup() {
  downloadFile(`ivoryx-backup-${todayKey()}.json`, JSON.stringify(state,null,2), 'application/json');
}
function importBackup(file) {
  const r = new FileReader();
  r.onload = () => { try { state = JSON.parse(r.result); save(); render(); toast('Backup restaurado'); } catch { toast('JSON inválido','err'); } };
  r.readAsText(file);
}
function importCsv(file) {
  const r = new FileReader();
  r.onload = () => {
    const lines = r.result.split(/\r?\n/).filter(Boolean);
    const header = lines.shift().toLowerCase().split(',');
    const idx = k => header.indexOf(k);
    let added = 0;
    lines.forEach(line => {
      const cells = line.match(/("([^"]|"")*"|[^,]*)(,|$)/g)?.map(c => c.replace(/,$/,'').replace(/^"|"$/g,'').replace(/""/g,'"')) || [];
      const name = cells[idx('nombre')];
      if (!name) return;
      state.products.push({
        id: uid(),
        name,
        category: cells[idx('categoria')] || 'Otros',
        model: cells[idx('modelo')] || '',
        color: cells[idx('color')] || '',
        stock: parseInt(cells[idx('stock')])||0,
        buyPrice: parseFloat(cells[idx('precio_compra')])||0,
        sellPrice: parseFloat(cells[idx('precio_venta')])||0,
        sku: cells[idx('sku')] || '',
        createdAt: new Date().toISOString(),
      });
      added++;
    });
    save(); render(); toast(`${added} productos importados`);
  };
  r.readAsText(file);
}

// =====================================================================
//  Render & Event delegation
// =====================================================================
function render() {
  // Theme
  document.documentElement.classList.toggle('dark', state.settings.theme==='dark');

  renderNav();

  const titles = { dashboard:'Dashboard', movements:'Historial de movimientos', stats:'Estadísticas', settings:'Configuración' };
  let html = '';
  if (currentRoute==='dashboard') { $('#pageTitle').textContent = 'Dashboard'; html = viewDashboard(); }
  else if (currentRoute==='customers') { $('#pageTitle').textContent = 'Clientes'; html = viewCustomers(); }
  else if (currentRoute==='movements') { $('#pageTitle').textContent = titles.movements; html = viewMovements(); }
  else if (currentRoute==='stats') { $('#pageTitle').textContent = titles.stats; html = viewStats(); }
  else if (currentRoute==='settings') { $('#pageTitle').textContent = titles.settings; html = viewSettings(); }
  else if (currentRoute.startsWith('category:')) {
    const cat = currentRoute.split(':')[1];
    $('#pageTitle').textContent = cat;
    html = viewCategory(cat);
  }
  $('#view').innerHTML = html;

  bindViewEvents();
}

function bindViewEvents() {
  // Quick actions / data-action
  $$('#view [data-action]').forEach(b => {
    b.onclick = () => {
      const a = b.dataset.action;
      const id = b.dataset.id;
      const cat = b.dataset.category;
      if (a==='new-product') productForm(null, cat);
      else if (a==='edit') productForm(state.products.find(p=>p.id===id));
      else if (a==='delete') {
        if (confirm('¿Eliminar este producto? Los movimientos asociados también se borrarán.')) {
          state.products = state.products.filter(p=>p.id!==id);
          state.movements = state.movements.filter(m=>m.productId!==id);
          save(); render(); toast('Producto eliminado');
          if (cloudReady) cloudDeleteProduct(id).catch(e => toast('Error nube: '+e.message,'err'));
        }
      }
      else if (a==='add-stock') addStockForm(id);
      else if (a==='new-sale') movementForm('out');
      else if (a==='new-inbound') movementForm('in');
      else if (a==='export-cat') exportCategory(cat);
      else if (a==='export-mov') exportMovements();
      else if (a==='backup') backup();
      else if (a==='new-customer') customerForm(null);
      else if (a==='edit-customer') customerForm(state.customers.find(c=>c.id===id));
      else if (a==='view-customer') viewCustomerHistory(id);
      else if (a==='delete-customer') {
        if (confirm('¿Eliminar este cliente? Las ventas mantienen el registro pero quedan sin cliente asociado.')) {
          state.customers = state.customers.filter(c=>c.id!==id);
          state.movements.forEach(m => { if (m.customerId===id) m.customerId = null; });
          save(); render(); toast('Cliente eliminado');
          if (cloudReady) cloudDeleteCustomer(id).catch(e => toast('Error nube: '+e.message,'err'));
        }
      }
      else if (a==='reset') {
        if (confirm('Borrar TODOS los datos. ¿Continuar?')) {
          state = defaultState(); save(); render(); toast('Datos reseteados');
        }
      }
      else if (a==='reset-all') {
        const typed = prompt('Esto eliminará TODOS los productos, movimientos, clientes y reiniciará la configuración.\n\nEscribí BORRAR para confirmar:');
        if (typed && typed.trim().toUpperCase() === 'BORRAR') {
          state = defaultState();
          save();
          listFilters = { q:'', lowOnly:false, color:'' };
          movFilters = { from:'', to:'', productId:'', category:'', type:'' };
          customerQuery = '';
          render();
          toast('Todos los datos fueron eliminados');
        } else if (typed !== null) {
          toast('Confirmación incorrecta. No se borró nada.','err');
        }
      }
    };
  });
  $$('#view [data-go]').forEach(b => b.onclick = () => navigate(b.dataset.go));

  // Category filters
  const cs = $('#catSearch'); if (cs) cs.oninput = e => { listFilters.q = e.target.value; render(); cs.focus(); };
  const lo = $('#lowOnly'); if (lo) lo.onchange = e => { listFilters.lowOnly = e.target.checked; render(); };
  $$('#view [data-color-filter]').forEach(b => b.onclick = () => { listFilters.color = b.dataset.colorFilter; render(); });
  const cuS = $('#custSearch'); if (cuS) cuS.oninput = e => { customerQuery = e.target.value; render(); cuS.focus(); };

  // Movements filters
  const bind = (id, key) => { const el=$('#'+id); if (el) el.onchange = e => { movFilters[key]=e.target.value; render(); }; };
  bind('movFrom','from'); bind('movTo','to'); bind('movType','type'); bind('movCategory','category'); bind('movProduct','productId');

  // Settings
  const ss = $('#saveSettings'); if (ss) ss.onclick = () => {
    state.settings.business = $('#setBusiness').value;
    state.settings.lowStock = parseInt($('#setLow').value)||0;
    state.settings.criticalStock = parseInt($('#setCrit').value)||0;
    save(); render(); toast('Configuración guardada');
  };
  const fb = $('#fileBackup'); if (fb) fb.onchange = e => e.target.files[0] && importBackup(e.target.files[0]);
  const fc = $('#fileCsv'); if (fc) fc.onchange = e => e.target.files[0] && importCsv(e.target.files[0]);

  // Supabase
  const connect = $('#connectSupa'); if (connect) connect.onclick = async () => {
    const url = $('#setSupaUrl').value.trim();
    const key = $('#setSupaKey').value.trim();
    if (!url || !key) return toast('Completá URL y key','err');
    saveCfg({ url, key });
    if (!initSupabase()) return toast('SDK Supabase no cargado','err');
    try {
      const data = await cloudLoad();
      if (data.products.length === 0 && data.movements.length === 0 && state.products.length > 0) {
        if (confirm('La nube está vacía. ¿Subir los datos locales ahora?')) await pushAll();
      } else {
        state.products = data.products; state.movements = data.movements; state.customers = data.customers; save();
      }
      render(); toast('Conectado a Supabase ✨');
    } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const push = $('#pushSupa'); if (push) push.onclick = async () => {
    if (!cloudReady) return toast('Conectá primero','err');
    if (!confirm('Esto sobreescribe los datos en la nube con los locales. ¿Continuar?')) return;
    try { await pushAll(); toast('Datos subidos'); } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const pull = $('#pullSupa'); if (pull) pull.onclick = async () => {
    if (!cloudReady) return toast('Conectá primero','err');
    try {
      const data = await cloudLoad();
      state.products = data.products; state.movements = data.movements; state.customers = data.customers; save(); render();
      toast('Datos descargados');
    } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const disc = $('#disconnectSupa'); if (disc) disc.onclick = () => {
    clearCfg(); supa=null; cloudReady=false; render(); toast('Desconectado');
  };
}

async function pushAll() {
  if (!cloudReady) return;
  if (state.customers.length) {
    const { error } = await supa.from('customers').upsert(state.customers.map(customerToRow));
    if (error) throw error;
  }
  if (state.products.length) {
    const { error } = await supa.from('products').upsert(state.products.map(productToRow));
    if (error) throw error;
  }
  if (state.movements.length) {
    const { error } = await supa.from('movements').upsert(state.movements.map(movToRow));
    if (error) throw error;
  }
}

// Topbar bindings
$('#btnTheme').onclick = () => { state.settings.theme = state.settings.theme==='dark'?'light':'dark'; save(); render(); };
$('#btnSettings').onclick = () => navigate('settings');
$('#btnMobileNav').onclick = () => $('#sidebar').classList.toggle('hidden');
$('#globalSearch').oninput = e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) return;
  const hit = state.products.find(p => (p.name+p.model+p.sku).toLowerCase().includes(q));
  if (hit) { navigate('category:'+hit.category); listFilters.q = q; render(); }
};

// Init
if (location.hash) currentRoute = location.hash.slice(1);
initSupabase();
render();

(async () => {
  if (!cloudReady) return;
  try {
    const data = await cloudLoad();
    if (data) {
      state.products = data.products;
      state.movements = data.movements;
      state.customers = data.customers;
      save();
      render();
      toast('Sincronizado con Supabase ✨','ok');
    }
  } catch (e) {
    console.error(e);
    toast('No se pudo conectar a Supabase: '+(e.message||e),'err');
  }
})();
</script>
</body>
</html>
