<!-- App Shell -->
<div id="app" class="flex min-h-screen">
  <!-- Sidebar -->
  <aside id="sidebar" class="hidden md:flex md:flex-col w-64 bg-ivory-900 text-white shrink-0">

  <!-- Main -->

            <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317a1 1 0 011.35 0l.7.633a1 1 0 00.94.245l.91-.244a1 1 0 011.213.728l.245.91a1 1 0 00.683.683l.91.244a1 1 0 01.728 1.214l-.244.91a1 1 0 00.245.94l.633.7a1 1 0 010 1.35l-.633.7a1 1 0 00-.245.94l.244.91a1 1 0 01-.728 1.214l-.91.244a1 1 0 00-.683.684l-.245.91a1 1 0 01-1.213.727l-.91-.244a1 1 0 00-.94.245l-.7.633a1 1 0 01-1.35 0l-.7-.633a1 1 0 00-.94-.245l-.91.244a1 1 0 01-1.213-.727l-.245-.91a1 1 0 00-.683-.684l-.91-.244a1 1 0 01-.728-1.214l.244-.91a1 1 0 00-.245-.94l-.633-.7a1 1 0 010-1.35l.633-.7a1 1 0 00.245-.94l-.244-.91a1 1 0 01.728-1.214l.91-.244a1 1 0 00.683-.683l.245-.91a1 1 0 011.213-.728l.91.244a1 1 0 00.94-.245l.7-.633zM12 15a3 3 0 100-6 3 3 0 000 6z"/></svg>

<!-- Modal root -->
<div id="modalRoot"></div>

<!-- Toast root -->
<div id="toastRoot" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

<script>
// =====================================================================
//  IVORYX · MVP single-file app
//  Persistencia: localStorage   ·   Stack futuro: React + Node + SQLite
// =====================================================================

const STORAGE_KEY = 'ivoryx.v1';
const CFG_KEY = 'ivoryx.supabase';
const CATEGORIES = ['Fundas','Celulares','Templados','Cargadores','Auriculares','Bolsas','Tarjetas','Otros'];
const COLOR_CATEGORIES = new Set(['Fundas','Celulares']);

// ---------------- Supabase ----------------
let supa = null;
let cloudReady = false;

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); } catch { return null; }
}
function saveCfg(cfg) { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
function clearCfg() { localStorage.removeItem(CFG_KEY); }

function initSupabase() {
  const cfg = loadCfg();
  if (!cfg?.url || !cfg?.key || !window.supabase) { supa = null; cloudReady = false; return false; }
  supa = window.supabase.createClient(cfg.url, cfg.key);
  cloudReady = true;
  return true;
}

const rowToProduct = r => ({
  id: r.id, name: r.name, category: r.category, model: r.model || '', color: r.color || '',
  sku: r.sku || '', stock: r.stock, buyPrice: r.buy_price, sellPrice: r.sell_price,
  battery: r.battery ?? null,
  createdAt: r.created_at,
});
const productToRow = p => ({
  id: p.id, name: p.name, category: p.category, model: p.model || null, color: p.color || null,
  sku: p.sku || null, stock: p.stock, buy_price: p.buyPrice, sell_price: p.sellPrice,
  battery: p.battery ?? null,
  created_at: p.createdAt,
});
const rowToMov = r => ({
  id: r.id, productId: r.product_id, type: r.type, qty: r.qty,
  unitCost: r.unit_cost, unitPrice: r.unit_price, date: r.date, note: r.note || '',
  customerId: r.customer_id || null,
});
const movToRow = m => ({
  id: m.id, product_id: m.productId, type: m.type, qty: m.qty,
  unit_cost: m.unitCost ?? null, unit_price: m.unitPrice ?? null, date: m.date, note: m.note || null,
  customer_id: m.customerId || null,
});
const rowToCustomer = r => ({
  id: r.id, firstName: r.first_name || '', lastName: r.last_name || '', phone: r.phone || '',
  createdAt: r.created_at,
});
const customerToRow = c => ({
  id: c.id, first_name: c.firstName || null, last_name: c.lastName || null,
  phone: c.phone || null, created_at: c.createdAt,
});

async function cloudLoad() {
  if (!cloudReady) return null;
  const [p, m, c] = await Promise.all([
    supa.from('products').select('*').order('created_at'),
    supa.from('movements').select('*').order('date', { ascending: false }),
    supa.from('customers').select('*').order('created_at'),
  ]);
  if (p.error) throw p.error;
  if (m.error) throw m.error;
  if (c.error && c.error.code !== '42P01') throw c.error; // tabla puede no existir aún
  return {
    products: p.data.map(rowToProduct),
    movements: m.data.map(rowToMov),
    customers: (c.data || []).map(rowToCustomer),
  };
}
async function cloudUpsertCustomer(c) {
  if (!cloudReady) return;
  const { error } = await supa.from('customers').upsert(customerToRow(c));
  if (error) throw error;
}
async function cloudDeleteCustomer(id) {
  if (!cloudReady) return;
  await supa.from('movements').update({ customer_id: null }).eq('customer_id', id);
  const { error } = await supa.from('customers').delete().eq('id', id);
  if (error) throw error;
}
async function cloudUpsertProduct(p) {
  if (!cloudReady) return;
  const { error } = await supa.from('products').upsert(productToRow(p));
  if (error) throw error;
}
async function cloudDeleteProduct(id) {
  if (!cloudReady) return;
  // borra movimientos asociados primero para no romper FK
  await supa.from('movements').delete().eq('product_id', id);
  const { error } = await supa.from('products').delete().eq('id', id);
  if (error) throw error;
}
async function cloudInsertMovement(m) {
  if (!cloudReady) return;
  const { error } = await supa.from('movements').insert(movToRow(m));
  if (error) throw error;
}

// ---------- Estado ----------
const defaultState = () => ({
  products: [],     // {id,name,category,model,color,stock,buyPrice,sellPrice,sku,createdAt}
  movements: [],    // {id,type:'in'|'out'|'adj',productId,qty,unitCost,unitPrice,date,note,customerId}
  customers: [],    // {id,firstName,lastName,phone,createdAt}
  settings: {
    theme: 'light',
    currency: 'ARS',
    lowStock: 5,
    criticalStock: 2,
    business: 'Ivoryx',
  },
});

let state = load();

function migratePlateado(products) {
  const changed = [];
  for (const p of (products||[])) {
    if ((p.color||'').toLowerCase() === 'plateado') {
      p.color = 'Otros';
      changed.push(p);
    }
  }
  return changed;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return seed(defaultState());
    const s = JSON.parse(raw);
    const merged = { ...defaultState(), ...s, customers: s.customers||[], settings: { ...defaultState().settings, ...(s.settings||{}) } };
    if (migratePlateado(merged.products).length) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
    }
    return merged;
  } catch { return seed(defaultState()); }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

function seed(s) {
  return s;
}

// Paleta sugerida para fundas — el usuario puede tipear cualquier color libre
const COLOR_PRESETS = [
  ['Negro','#111827'], ['Blanco','#F8FAFC'], ['Transparente','transparent'],
  ['Azul','#2563EB'], ['Celeste','#38BDF8'], ['Rojo','#DC2626'],
  ['Rosa','#EC4899'], ['Violeta','#7C3AED'], ['Verde','#16A34A'],
  ['Amarillo','#FACC15'], ['Naranja','#F97316'], ['Gris','#6B7280'],
  ['Beige','#E7D7B1'], ['Dorado','#D4AF37'], ['Otros','#C0C0C0'],
];
function colorHex(name) {
  const hit = COLOR_PRESETS.find(([n]) => n.toLowerCase() === (name||'').toLowerCase());
  return hit ? hit[1] : null;
}
function colorChip(name) {
  if (!name) return '<span class="text-slate-400">—</span>';
  const hex = colorHex(name) || '#94a3b8';
  const border = (hex === 'transparent' || hex.toLowerCase() === '#f8fafc') ? 'border border-slate-300' : '';
  const bg = hex === 'transparent'
    ? 'background:repeating-conic-gradient(#cbd5e1 0 25%,transparent 0 50%) 50%/8px 8px;'
    : `background:${hex};`;
  return `<span class="inline-flex items-center gap-1.5">
    <span class="w-3.5 h-3.5 rounded-full ${border}" style="${bg}"></span>
    ${escapeHtml(name)}
  </span>`;
}

function batteryChip(pct) {
  if (pct === null || pct === undefined || pct === '') return '<span class="text-slate-400">—</span>';
  const n = Math.max(0, Math.min(100, Number(pct)));
  const color = n >= 80 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300'
              : n >= 50 ? 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-300'
              : 'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-300';
  return `<span class="px-2 py-0.5 text-xs rounded-full font-semibold ${color}">${n}%</span>`;
}

// ---------- Utils ----------
const fmt = new Intl.NumberFormat('es-AR',{ style:'currency', currency:'ARS', maximumFractionDigits:0 });
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const escapeHtml = (s='') => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, kind='ok') {
  const colors = { ok:'bg-emerald-600', err:'bg-rose-600', info:'bg-ivory-700' };
  const el = document.createElement('div');
  el.className = `${colors[kind]} text-white text-sm px-4 py-2 rounded-xl shadow-lg animate-[fadeIn_.2s_ease]`;
  el.textContent = msg;
  $('#toastRoot').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function todayKey(d=new Date()) { return d.toISOString().slice(0,10); }

// ---------- Routing ----------
const ROUTES = [
  { id:'dashboard', label:'Dashboard', icon:'M3 12l2-2 4 4 8-8 4 4' },
  { id:'category:Fundas', label:'Fundas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Celulares', label:'Celulares', icon:'M7 4h10a1 1 0 011 1v14a1 1 0 01-1 1H7a1 1 0 01-1-1V5a1 1 0 011-1zM11 18h2' },
  { id:'category:Templados', label:'Templados', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Cargadores', label:'Cargadores', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Auriculares', label:'Auriculares', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Bolsas', label:'Bolsas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Tarjetas', label:'Tarjetas', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'category:Otros', label:'Otros', icon:'M4 7h16M4 12h16M4 17h10' },
  { id:'customers', label:'Clientes', icon:'M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-2a4 4 0 100-8 4 4 0 000 8zm6 0a3 3 0 100-6 3 3 0 000 6z' },
  { id:'movements', label:'Movimientos', icon:'M4 6h16M4 12h16M4 18h16' },
  { id:'stats', label:'Estadísticas', icon:'M3 3v18h18M7 15l3-3 3 3 5-5' },
  { id:'settings', label:'Configuración', icon:'M12 15a3 3 0 100-6 3 3 0 000 6z' },
];

let currentRoute = 'dashboard';
function navigate(id) {
  currentRoute = id;
  render();
  history.replaceState(null, '', '#' + encodeURI(id));
}

function renderNav() {
  const nav = $('#nav');
  nav.innerHTML = ROUTES.map(r => `
    <button data-route="${r.id}" class="route-btn w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left transition
      ${currentRoute===r.id ? 'bg-white/10 text-white' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${r.icon}"/></svg>
      <span>${r.label}</span>
    </button>`).join('');
  $$('#nav .route-btn').forEach(b => b.onclick = () => navigate(b.dataset.route));
}

// ---------- Stock helpers ----------
function stockLevel(p) {
  if (p.stock <= 0) return { label:'Sin stock', color:'bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-300' };
  return { label:'OK', color:'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300' };
}

// =====================================================================
//  VIEWS
// =====================================================================

function viewDashboard() {
  const total = state.products.reduce((a,p)=>a+p.stock,0);
  const low = state.products.filter(p => p.stock>0 && p.stock<=state.settings.lowStock).length;
  const out = state.products.filter(p => p.stock<=0).length;
  const today = todayKey();
  const dayMoves = state.movements.filter(m => m.date.slice(0,10)===today);
  const sales = dayMoves.filter(m=>m.type==='out');
  const dayUnits = sales.reduce((a,m)=>a+m.qty,0);
  const dayRevenue = sales.reduce((a,m)=>a+m.qty*(m.unitPrice||0),0);
  const dayProfit = sales.reduce((a,m)=>{
    const prod = state.products.find(p=>p.id===m.productId);
    const cost = m.unitCost ?? prod?.buyPrice ?? 0;
    return a + m.qty * ((m.unitPrice||0) - cost);
  },0);
  const last = [...state.movements].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  const invValue = state.products.reduce((a,p)=>a+p.stock*p.sellPrice,0);

  return `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${statCard('Productos en stock', total, 'ivory-500', 'unidades totales')}
      ${statCard('Poco stock', low, 'amber-500', `≤ ${state.settings.lowStock} unidades`)}
      ${statCard('Agotados', out, 'rose-500', 'sin stock')}
      ${statCard('Valor inventario', fmt.format(invValue), 'emerald-500', 'precio venta')}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
      ${statCard('Ventas del día', dayUnits, 'ivory-500', `${sales.length} operaciones`)}
      ${statCard('Ingresos del día', fmt.format(dayRevenue), 'ivory-500', 'facturado hoy')}
      ${statCard('Ganancia del día', fmt.format(dayProfit), 'emerald-500', 'margen estimado')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-6">
      <div class="lg:col-span-2 bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold">Últimos movimientos</h3>
          <button class="text-sm text-ivory-500 hover:underline" data-go="movements">Ver todos →</button>
        </div>
        ${last.length ? `
          <div class="overflow-x-auto scrollbar-thin">
            <table class="w-full text-sm">
              <thead class="text-left text-slate-500 dark:text-slate-400">
                <tr><th class="py-2">Fecha</th><th>Tipo</th><th>Producto</th><th class="text-right">Cant.</th><th class="text-right">Importe</th></tr>
              </thead>
              <tbody>
                ${last.map(m => {
                  const p = state.products.find(pp=>pp.id===m.productId);
                  const amount = m.type==='out' ? m.qty*(m.unitPrice||0) : m.qty*(m.unitCost||0);
                  return `<tr class="border-t border-slate-100 dark:border-white/5">
                    <td class="py-2">${new Date(m.date).toLocaleString('es-AR')}</td>
                    <td>${typeBadge(m.type)}</td>
                    <td>${escapeHtml(p?.name || '—')} <span class="text-slate-400">· ${escapeHtml(p?.model||'')}</span></td>
                    <td class="text-right">${m.qty}</td>
                    <td class="text-right">${fmt.format(amount)}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>` : `<p class="text-sm text-slate-500">Aún no hay movimientos.</p>`}
      </div>

      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-3">Acciones rápidas</h3>
        <div class="space-y-2">
          <button class="w-full px-4 py-3 rounded-xl bg-ivory-500 hover:bg-ivory-700 text-white text-sm font-medium" data-action="new-sale">+ Nueva venta</button>
          <button class="w-full px-4 py-3 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm font-medium" data-action="new-inbound">+ Nuevo ingreso</button>
          <button class="w-full px-4 py-3 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm font-medium" data-action="new-product">+ Nuevo producto</button>
        </div>
        <div class="mt-5 pt-5 border-t border-slate-100 dark:border-white/5">
          <h4 class="text-sm font-semibold mb-2">Alertas</h4>
          ${renderAlerts()}
        </div>
      </div>
    </div>
  `;
}

function statCard(label, value, color, hint) {
  return `<div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
    <div class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">${label}</div>
    <div class="text-2xl md:text-3xl font-bold mt-1">${value}</div>
    <div class="text-xs mt-1 text-${color}">${hint}</div>
  </div>`;
}

function typeBadge(t) {
  if (t==='in') return `<span class="inline-flex px-2 py-0.5 text-xs rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-300">Ingreso</span>`;
  if (t==='out') return `<span class="inline-flex px-2 py-0.5 text-xs rounded-full bg-ivory-100 text-ivory-700 dark:bg-ivory-500/20 dark:text-ivory-300">Venta</span>`;
  return `<span class="inline-flex px-2 py-0.5 text-xs rounded-full bg-slate-100 text-slate-700 dark:bg-white/10 dark:text-slate-300">Ajuste</span>`;
}

function renderAlerts() {
  const alerts = state.products.filter(p => p.stock<=state.settings.lowStock).sort((a,b)=>a.stock-b.stock).slice(0,6);
  if (!alerts.length) return `<p class="text-sm text-slate-500">Sin alertas. Stock saludable ✨</p>`;
  return `<ul class="space-y-2 text-sm">${alerts.map(p => {
    const lvl = stockLevel(p);
    return `<li class="flex items-center justify-between gap-2">
      <span class="truncate">${escapeHtml(p.name)} <span class="text-slate-400">${escapeHtml(p.model||'')}</span></span>
      <span class="px-2 py-0.5 text-xs rounded-full ${lvl.color}">${p.stock} · ${lvl.label}</span>
    </li>`;
  }).join('')}</ul>`;
}

// ---------- Category view ----------
let listFilters = { q:'', lowOnly:false, color:'' };

const MODEL_DRILLDOWN = new Set(['Fundas','Templados','Celulares']);
const FUNDA_COLOR_ORDER = ['Blanco','Negro','Azul','Rojo','Otros','Magsafe'];
const FUNDA_NAMED = new Set(['blanco','negro','azul','rojo']);

function fundaBucket(p) {
  const c = (p.color || '').trim().toLowerCase();
  if (c === 'transparente' || /magsafe/i.test(p.name || '')) return 'Magsafe';
  if (FUNDA_NAMED.has(c)) return c.charAt(0).toUpperCase() + c.slice(1);
  return 'Otros';
}
function isFundaMagsafe(p) {
  const c = (p.color || '').trim().toLowerCase();
  return c === 'transparente' || /magsafe/i.test(p.name || '');
}
function templadoBucket(p) {
  const n = (p.name || '').toLowerCase();
  if (n.includes('privacidad') || n.includes('anti espia') || n.includes('anti espía') || n.includes('antiespia') || n.includes('antiespía')) {
    return 'Templados anti espía';
  }
  return 'Templados';
}

function viewCategoryModels(category) {
  const products = state.products
    .filter(p => p.category === category)
    .filter(p => !listFilters.q || (p.name+p.model+p.sku+(p.color||'')).toLowerCase().includes(listFilters.q.toLowerCase()));

  const byModel = new Map();
  for (const p of products) {
    const key = (p.model || '').trim() || '— Sin modelo —';
    if (!byModel.has(key)) byModel.set(key, { units: 0, variants: 0 });
    const cur = byModel.get(key);
    cur.units += p.stock;
    cur.variants += 1;
  }
  const models = [...byModel.entries()]
    .map(([model, v]) => ({ model, ...v }))
    .sort((a,b) => a.model.localeCompare(b.model, 'es'));

  return `
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <div class="relative flex-1 min-w-[200px]">
        <input id="catSearch" placeholder="Buscar modelo..." value="${escapeHtml(listFilters.q)}" class="w-full pl-9 pr-3 py-2 rounded-xl bg-white dark:bg-ivory-800 border border-slate-200 dark:border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-ivory-500"/>
        <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
      </div>
      <button data-action="new-product" data-category="${category}" class="px-4 py-2 rounded-xl bg-ivory-500 hover:bg-ivory-700 text-white text-sm font-medium">+ Producto</button>
      ${category==='Fundas' ? `
        <button data-action="seed-fundas" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm">+ Crear modelos</button>
        <button data-action="bulk-price" data-bulk="silicona" class="px-4 py-2 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm">Precio compra Silicona</button>
        <button data-action="bulk-price" data-bulk="magsafe" class="px-4 py-2 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm">Precio compra MagSafe</button>` : ''}
      <button data-action="export-cat" data-category="${category}" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm">Exportar CSV</button>
    </div>

    ${models.length ? `
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${models.map(m => {
          const lowish = m.units <= state.settings.lowStock;
          const out = m.units <= 0;
          const tone = out ? 'text-rose-600 dark:text-rose-300' : lowish ? 'text-amber-600 dark:text-amber-300' : 'text-emerald-600 dark:text-emerald-300';
          return `<button data-model="${escapeHtml(m.model)}" class="model-card group text-left bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5 hover:border-ivory-500 hover:shadow-md transition">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="font-semibold truncate">${escapeHtml(m.model)}</div>
                <div class="text-xs text-slate-500 mt-1">${m.variants} variante${m.variants===1?'':'s'}</div>
              </div>
              <div class="text-right">
                <div class="text-2xl font-bold ${tone}">${m.units}</div>
                <div class="text-[10px] uppercase tracking-wide text-slate-400">en stock</div>
              </div>
            </div>
            <div class="mt-3 text-xs text-ivory-500 opacity-0 group-hover:opacity-100 transition">Ver detalle →</div>
          </button>`;
        }).join('')}
      </div>` : `
      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-10 text-center text-slate-500">
        Sin modelos cargados en ${escapeHtml(category)}.

}

// ---------- Movements view ----------
let movFilters = { from:'', to:'', productId:'', category:'', type:'' };

function viewMovements() {
  let list = [...state.movements].sort((a,b)=>b.date.localeCompare(a.date));
  if (movFilters.from) list = list.filter(m => m.date >= movFilters.from);
  if (movFilters.to)   list = list.filter(m => m.date <= movFilters.to + 'T23:59:59');
  if (movFilters.productId) list = list.filter(m => m.productId === movFilters.productId);
  if (movFilters.type) list = list.filter(m => m.type === movFilters.type);
  if (movFilters.category) {
    const ids = new Set(state.products.filter(p=>p.category===movFilters.category).map(p=>p.id));
    list = list.filter(m => ids.has(m.productId));
  }

  const totalGastado = list.filter(m=>m.type==='in').reduce((a,m)=>a+m.qty*(m.unitCost||0),0);
  const totalIngresado = list.filter(m=>m.type==='out').reduce((a,m)=>a+m.qty*(m.unitPrice||0),0);
  const ganancia = list.filter(m=>m.type==='out').reduce((a,m)=>{
    const p = state.products.find(pp=>pp.id===m.productId);
    const cost = m.unitCost ?? p?.buyPrice ?? 0;
    return a + m.qty * ((m.unitPrice||0) - cost);
  },0);

  return `
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
      ${statCard('Plata gastada', fmt.format(totalGastado), 'rose-500', 'compras / ingresos')}
      ${statCard('Plata cobrada', fmt.format(totalIngresado), 'ivory-500', 'ventas')}
      ${statCard('Ganancia', fmt.format(ganancia), 'emerald-500', 'ventas − costo')}
    </div>
  ` + `
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <button data-action="new-sale" class="px-4 py-2 rounded-xl bg-ivory-500 hover:bg-ivory-700 text-white text-sm font-medium">+ Nueva venta</button>
      <button data-action="new-inbound" class="px-4 py-2 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm font-medium">+ Nuevo ingreso</button>
      <button data-action="export-mov" class="ml-auto px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm">Exportar CSV</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
      <input id="movFrom" type="date" value="${movFilters.from}" class="px-3 py-2 rounded-xl bg-white dark:bg-ivory-800 border border-slate-200 dark:border-white/10 text-sm"/>
      <input id="movTo" type="date" value="${movFilters.to}" class="px-3 py-2 rounded-xl bg-white dark:bg-ivory-800 border border-slate-200 dark:border-white/10 text-sm"/>

        <option value="out" ${movFilters.type==='out'?'selected':''}>Ventas</option>
        <option value="adj" ${movFilters.type==='adj'?'selected':''}>Ajustes</option>
      </select>
      <select id="movCategory" class="px-3 py-2 rounded-xl bg-white dark:bg-ivory-800 border border-slate-200 dark:border-white/10 text-sm">
        <option value="">Todas las categorías</option>

              <th class="px-4 py-3">Tipo</th>
              <th class="px-4 py-3">Productos</th>
              <th class="px-4 py-3 text-right">Cant.</th>
              <th class="px-4 py-3 text-right">Total</th>
              <th class="px-4 py-3">Cliente</th>
              <th class="px-4 py-3">Nota</th>

            ${(() => {
              if (!list.length) return `<tr><td colspan="7" class="px-4 py-10 text-center text-slate-500">Sin movimientos para los filtros aplicados.</td></tr>`;
              const groups = new Map();
              for (const m of list) {
                const key = `${m.type}|${m.date}|${m.customerId||''}|${m.note||''}`;
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(m);
              }
              return [...groups.values()].map(items => {
                const first = items[0];
                const c = first.customerId ? state.customers.find(cc=>cc.id===first.customerId) : null;
                const totalQty = items.reduce((a,m)=>a+m.qty,0);
                const total = items.reduce((a,m)=>{
                  const u = m.type==='out' ? (m.unitPrice||0) : (m.unitCost||0);
                  return a + u*m.qty;
                },0);
                const productsHtml = items.map(m => {
                  const p = state.products.find(pp=>pp.id===m.productId);
                  const u = m.type==='out' ? (m.unitPrice||0) : (m.unitCost||0);
                  const label = p ? `${escapeHtml(p.name)} <span class="text-slate-400">· ${escapeHtml(p.model||'')}${p.color?' · '+escapeHtml(p.color):''}</span>` : '—';
                  return `<div class="flex justify-between gap-2 py-0.5">
                    <span class="truncate">${label}</span>
                    <span class="text-xs text-slate-500 whitespace-nowrap">${m.qty} × ${fmt.format(u)}</span>

                }).join('');
                return `<tr class="border-t border-slate-100 dark:border-white/5 align-top">
                  <td class="px-4 py-2 whitespace-nowrap">${new Date(first.date).toLocaleString('es-AR')}</td>
                  <td class="px-4 py-2">${typeBadge(first.type)}</td>
                  <td class="px-4 py-2 min-w-[260px]">${items.length>1?`<div class="text-xs text-slate-500 mb-1">${items.length} productos</div>`:''}${productsHtml}</td>
                  <td class="px-4 py-2 text-right">${totalQty}</td>
                  <td class="px-4 py-2 text-right font-semibold">${fmt.format(total)}</td>
                  <td class="px-4 py-2">${c ? `${escapeHtml(c.firstName)} ${escapeHtml(c.lastName)}<div class="text-xs text-slate-400">${escapeHtml(c.phone)}</div>` : '<span class="text-slate-400">—</span>'}</td>
                  <td class="px-4 py-2 text-slate-500">${escapeHtml(first.note||'')}</td>
                </tr>`;
              }).join('');
            })()}
          </tbody>
        </table>

    </div>
  `;
}

// ---------- Stats ----------
function viewStats() {
  const sales = state.movements.filter(m=>m.type==='out');
  const byProduct = new Map();
  for (const m of sales) {
    const cur = byProduct.get(m.productId) || { qty:0, revenue:0, profit:0 };
    cur.qty += m.qty;
    cur.revenue += m.qty * (m.unitPrice||0);
    const p = state.products.find(pp=>pp.id===m.productId);
    const cost = m.unitCost ?? p?.buyPrice ?? 0;
    cur.profit += m.qty * ((m.unitPrice||0)-cost);
    byProduct.set(m.productId, cur);
  }
  const top = [...byProduct.entries()].map(([id,v]) => ({ p: state.products.find(pp=>pp.id===id), ...v }))
    .filter(x=>x.p).sort((a,b)=>b.qty-a.qty).slice(0,10);

  const totalProfit = sales.reduce((a,m)=>{
    const p = state.products.find(pp=>pp.id===m.productId);
    const cost = m.unitCost ?? p?.buyPrice ?? 0;
    return a + m.qty * ((m.unitPrice||0)-cost);
  },0);
  const totalRevenue = sales.reduce((a,m)=>a+m.qty*(m.unitPrice||0),0);

  // Ventas por mes
  const byMonth = new Map();
  for (const m of sales) {
    const k = m.date.slice(0,7);
    byMonth.set(k, (byMonth.get(k)||0) + m.qty*(m.unitPrice||0));
  }
  const months = [...byMonth.entries()].sort();
  const maxMonth = Math.max(1, ...months.map(([,v])=>v));

  const invValue = state.products.reduce((a,p)=>a+p.stock*p.sellPrice,0);

  return `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${statCard('Ingresos totales', fmt.format(totalRevenue), 'ivory-500', 'históricos')}
      ${statCard('Ganancia total', fmt.format(totalProfit), 'emerald-500', 'histórica')}
      ${statCard('Unidades vendidas', sales.reduce((a,m)=>a+m.qty,0), 'ivory-500', `${sales.length} operaciones`)}
      ${statCard('Valor inventario', fmt.format(invValue), 'emerald-500', 'a precio venta')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-6">
      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-4">Productos más vendidos</h3>
        ${top.length ? `<table class="w-full text-sm">
          <thead class="text-left text-slate-500 dark:text-slate-400">
            <tr><th class="py-2">Producto</th><th class="text-right">Unidades</th><th class="text-right">Ingreso</th><th class="text-right">Ganancia</th></tr>
          </thead>
          <tbody>
          ${top.map(t=>`<tr class="border-t border-slate-100 dark:border-white/5">
            <td class="py-2">${escapeHtml(t.p.name)} <span class="text-slate-400">· ${escapeHtml(t.p.model||'')}</span></td>
            <td class="text-right font-semibold">${t.qty}</td>
            <td class="text-right">${fmt.format(t.revenue)}</td>
            <td class="text-right text-emerald-600 dark:text-emerald-300">${fmt.format(t.profit)}</td>
          </tr>`).join('')}
          </tbody></table>` : `<p class="text-sm text-slate-500">Aún no hay ventas registradas.</p>`}
      </div>

      <div class="bg-white dark:bg-ivory-800 rounded-2xl shadow-sm border border-slate-200 dark:border-white/5 p-5">
        <h3 class="font-semibold mb-4">Ventas por mes</h3>
        ${months.length ? `<div class="space-y-2">
          ${months.map(([k,v])=>`
            <div>
              <div class="flex justify-between text-xs text-slate-500 mb-1"><span>${k}</span><span>${fmt.format(v)}</span></div>
              <div class="h-2 bg-slate-100 dark:bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-ivory-500 to-ivory-300" style="width:${(v/maxMonth*100).toFixed(1)}%"></div>
              </div>
            </div>`).join('')}
        </div>` : `<p class="text-sm text-slate-500">Sin datos suficientes.</p>`}
      </div>
    </div>
  `;
}

  root.innerHTML = `

  $('#modalBg').onclick = closeModal;
  if (onMount) onMount();
}

        model: $('#fModel').value.trim(),

        sellPrice: parseFloat($('#fSell').value)||0,

      else {

        state.products.push(target);

      save(); closeModal(); render(); toast('Producto guardado');
      if (cloudReady) cloudUpsertProduct(target).catch(e => toast('Error nube: '+e.message,'err'));
    };
  });
}

function movementForm(type, presetProductId=null) {
  const isOut = type==='out';
  const title = isOut ? 'Nueva venta' : 'Nuevo ingreso';
  openModal(`
    <h3 class="text-lg font-semibold mb-4">${title}</h3>
    <div class="space-y-3 text-sm">
      <div>
        <label class="block mb-1">Producto</label>
        <div class="relative">
          <input id="mProdSearch" autocomplete="off" placeholder="Buscar por nombre, modelo, color o SKU..." class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 focus:outline-none focus:ring-2 focus:ring-ivory-500"/>
          <input id="mProd" type="hidden" value="${presetProductId||''}"/>
          <div id="mProdList" class="hidden absolute left-0 right-0 mt-1 z-10 max-h-64 overflow-y-auto scrollbar-thin bg-white dark:bg-ivory-700 border border-slate-200 dark:border-white/10 rounded-xl shadow-lg"></div>
        </div>
        <div id="mProdPicked" class="mt-2 text-xs text-slate-500"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block mb-1">Cantidad</label>
          <input id="mQty" type="number" min="1" value="1" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
        <div>
          <label class="block mb-1">${isOut?'Precio venta unitario':'Costo unitario'}</label>
          <input id="mUnit" type="number" min="0" step="0.01" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
      </div>
      ${isOut ? `
      <div class="pt-3 border-t border-slate-200 dark:border-white/10">
        <div class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-2">Cliente</div>
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block mb-1">Celular *</label>
            <input id="mPhone" autocomplete="off" placeholder="11 5555-5555" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
            <div id="mCustHint" class="text-xs text-slate-500 mt-1"></div>
          </div>
          <div>
            <label class="block mb-1">Nombre *</label>
            <input id="mFirst" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
          </div>
          <div>
            <label class="block mb-1">Apellido</label>
            <input id="mLast" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
          </div>
        </div>
      </div>` : ''}
      <div>
        <label class="block mb-1">Nota (opcional)</label>
        <input id="mNote" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
      </div>
      <div id="mPreview" class="text-xs text-slate-500"></div>
    </div>
    <div class="flex justify-end gap-2 mt-5">
      <button id="cancel" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 text-sm">Cancelar</button>
      <button id="save" class="px-4 py-2 rounded-xl ${isOut?'bg-ivory-500 hover:bg-ivory-700':'bg-ivory-900 hover:bg-ivory-800'} text-white text-sm font-medium">Registrar</button>
    </div>
  `, () => {
    const sel = $('#mProd'), unit = $('#mUnit'), qty = $('#mQty'), prev = $('#mPreview');
    const search = $('#mProdSearch'), list = $('#mProdList'), picked = $('#mProdPicked');

    const productLabel = p => `${p.name} · ${p.model||'—'}${p.color?` · ${p.color}`:''}`;

    const renderList = (q='') => {
      const needle = q.toLowerCase().trim();
      const matches = state.products
        .filter(p => !needle || (p.name+' '+p.model+' '+(p.color||'')+' '+p.category+' '+(p.sku||'')).toLowerCase().includes(needle))
        .slice(0, 40);
      if (!matches.length) {
        list.innerHTML = `<div class="px-3 py-2 text-sm text-slate-500">Sin resultados</div>`;
      } else {
        list.innerHTML = matches.map(p => `
          <button type="button" data-pid="${p.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-ivory-100 dark:hover:bg-white/10 flex items-center gap-2">
            <span class="flex-1 truncate">
              <span class="font-medium">${escapeHtml(p.name)}</span>
              <span class="text-slate-500"> · ${escapeHtml(p.model||'—')}</span>
              ${p.color ? ` · ${colorChip(p.color)}` : ''}
            </span>
            <span class="text-xs ${p.stock<=0?'text-rose-500':p.stock<=state.settings.lowStock?'text-amber-500':'text-slate-400'}">stock ${p.stock}</span>
          </button>`).join('');
        list.querySelectorAll('[data-pid]').forEach(b => b.onclick = () => pick(b.dataset.pid));
      }
      list.classList.remove('hidden');
    };

    const pick = (id) => {
      const p = state.products.find(x => x.id === id);
      if (!p) return;
      sel.value = id;
      search.value = productLabel(p);
      picked.innerHTML = `Stock actual: <b>${p.stock}</b> · P. compra ${fmt.format(p.buyPrice)} · P. venta ${fmt.format(p.sellPrice)}`;
      list.classList.add('hidden');
      updateUnit();
    };

    function updateUnit() {
      const p = state.products.find(x=>x.id===sel.value);
      if (!p) return;
      unit.value = isOut ? p.sellPrice : p.buyPrice;
      refresh();
    }

    function refresh() {
      const p = state.products.find(x=>x.id===sel.value);
      const q = parseInt(qty.value)||0;
      const u = parseFloat(unit.value)||0;
      if (!p) { prev.textContent=''; return; }
      if (isOut) {
        const profit = (u - p.buyPrice) * q;
        prev.innerHTML = `Total: <b>${fmt.format(u*q)}</b> · Ganancia estimada: <b class="text-emerald-600">${fmt.format(profit)}</b> · Stock disponible: ${p.stock}`;
      } else {
        prev.innerHTML = `Total compra: <b>${fmt.format(u*q)}</b> · Stock resultante: ${p.stock + q}`;
      }
    }
    qty.oninput = refresh; unit.oninput = refresh;

    search.oninput = () => { sel.value=''; renderList(search.value); };
    search.onfocus = () => renderList(search.value);
    document.addEventListener('mousedown', (e) => {
      if (!list.contains(e.target) && e.target !== search) list.classList.add('hidden');
    });

    if (presetProductId) pick(presetProductId);
    else setTimeout(() => search.focus(), 50);

    if (isOut) {
      const phone = $('#mPhone'), first = $('#mFirst'), last = $('#mLast'), hint = $('#mCustHint');
      phone.oninput = () => {
        const v = phone.value.trim();
        if (!v) { hint.textContent=''; return; }
        const found = state.customers.find(c => c.phone === v);
        if (found) {
          first.value = found.firstName;
          last.value = found.lastName;
          hint.innerHTML = `<span class="text-emerald-600">Cliente existente: ${escapeHtml(found.firstName)} ${escapeHtml(found.lastName)}</span>`;
        } else {
          hint.innerHTML = `<span class="text-slate-500">Cliente nuevo — se creará al guardar.</span>`;
        }
      };
    }
    $('#cancel').onclick = closeModal;
    $('#save').onclick = () => {
      const p = state.products.find(x=>x.id===sel.value);
      if (!p) return toast('Seleccioná un producto','err');
      const q = parseInt(qty.value)||0;
      const u = parseFloat(unit.value)||0;
      if (q<=0) return toast('Cantidad inválida','err');
      if (isOut && q > p.stock) return toast('Stock insuficiente','err');

      let customer = null;
      if (isOut) {
        const phone = $('#mPhone').value.trim();
        const first = $('#mFirst').value.trim();
        const lastN = $('#mLast').value.trim();
        if (!phone) return toast('El celular del cliente es obligatorio','err');
        if (!first) return toast('El nombre del cliente es obligatorio','err');
        customer = state.customers.find(c => c.phone === phone);
        if (customer) {
          if (first && first !== customer.firstName) customer.firstName = first;
          if (lastN && lastN !== customer.lastName) customer.lastName = lastN;
        } else {
          customer = { id: uid(), firstName: first, lastName: lastN, phone, createdAt: new Date().toISOString() };
          state.customers.push(customer);
        }
      }

      const mov = { id: uid(), type, productId:p.id, qty:q, date: new Date().toISOString(), note: $('#mNote').value.trim() };
      if (isOut) { mov.unitPrice = u; mov.unitCost = p.buyPrice; mov.customerId = customer.id; p.stock -= q; }
      else { mov.unitCost = u; p.buyPrice = u || p.buyPrice; p.stock += q; }
      state.movements.push(mov);
      save(); closeModal(); render(); toast(isOut?'Venta registrada':'Ingreso registrado');
      if (cloudReady) {
        const ops = [cloudInsertMovement(mov), cloudUpsertProduct(p)];
        if (customer) ops.push(cloudUpsertCustomer(customer));
        Promise.all(ops).catch(e => toast('Error nube: '+e.message,'err'));
      }
    };
  });
}

function addStockForm(productId) {
  const p = state.products.find(x=>x.id===productId);
  if (!p) return;
  movementForm('in', productId);
}

const FUNDA_VARIANT_COLORS = ['Blanco','Negro','Azul','Rojo','Otros','Transparente'];

    <textarea id="seedModels" rows="22" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-sm font-mono">iPhone X
iPhone XR
iPhone XS
iPhone XS Max
iPhone 11
iPhone 11 Pro
iPhone 11 Pro Max
iPhone 12
iPhone 12 Pro
iPhone 12 Pro Max
iPhone 13
iPhone 13 Pro
iPhone 13 Pro Max
iPhone 14
iPhone 14 Pro
iPhone 14 Pro Max
iPhone 15
iPhone 15 Pro
iPhone 15 Pro Max
iPhone 16
iPhone 16 Pro
iPhone 16 Pro Max
Otros</textarea>
    <div class="flex justify-end gap-2 mt-5">
      <button id="cancel" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 text-sm">Cancelar</button>
      <button id="save" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium">Crear</button>
    </div>
  `, () => {
    $('#cancel').onclick = closeModal;
    $('#save').onclick = () => {
      const raw = $('#seedModels').value;
      const models = [...new Set(raw.split(/\r?\n/).map(s => s.trim()).filter(Boolean))];
      if (!models.length) return toast('Ingresá al menos un modelo','err');
      const now = new Date().toISOString();
      let created = 0, skipped = 0;
      const newProds = [];
      for (const model of models) {
        for (const color of FUNDA_VARIANT_COLORS) {
          const dup = state.products.find(p =>
            p.category === 'Fundas' &&
            p.name.toLowerCase() === 'funda' &&
            (p.model||'').toLowerCase() === model.toLowerCase() &&
            (p.color||'').toLowerCase() === color.toLowerCase()
          );
          if (dup) { skipped++; continue; }
          const prod = {
            id: uid(), name: 'Funda', category: 'Fundas',
            model, color, sku: '', stock: 0, buyPrice: 0, sellPrice: 0,
            battery: null, createdAt: now,
          };
          state.products.push(prod);
          newProds.push(prod);
          created++;
        }
      }
      save(); closeModal(); render();
      toast(`${created} producto${created===1?'':'s'} creado${created===1?'':'s'}${skipped?` · ${skipped} ya existía${skipped===1?'':'n'}`:''}`);
      if (cloudReady && newProds.length) {
        Promise.all(newProds.map(cloudUpsertProduct)).catch(e => toast('Error nube: '+e.message,'err'));
      }
    };
  }, 'md');
}

function ingresoForm() {
  const lines = [{ id: uid(), productId: '', qty: 1, unitPrice: '' }];
  const productLabel = p => `${p.name} · ${p.model||'—'}${p.color?` · ${p.color}`:''}`;

  const lineSubtotal = (l) => {
    const p = state.products.find(x=>x.id===l.productId);
    const q = parseInt(l.qty)||0;
    const explicit = l.unitPrice === '' || l.unitPrice === null ? null : parseFloat(l.unitPrice);
    const u = (explicit !== null && isFinite(explicit)) ? explicit : (p ? p.buyPrice : 0);
    return q * u;
  };

  const lineHtml = (line, idx) => {
    const p = state.products.find(x=>x.id===line.productId);
    const placeholder = p ? `Toma ${fmt.format(p.buyPrice)} si lo dejás vacío` : 'Precio compra (opcional)';
    const searchVal = p ? escapeHtml(productLabel(p)) : '';
    const pickedHtml = p ? `Stock actual: <b>${p.stock}</b> · P. compra actual ${fmt.format(p.buyPrice)} · P. venta ${fmt.format(p.sellPrice)}` : '';
    return `
    <div class="line-row border border-slate-200 dark:border-white/10 rounded-xl p-3" data-lid="${line.id}">
      <div class="flex items-center justify-between mb-2">
        <div class="text-xs font-semibold text-slate-500">Producto ${idx+1}</div>
        <button type="button" class="ln-remove text-rose-600 text-xs hover:underline">Quitar</button>

      <div class="relative">
        <input class="ln-search w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-ivory-500" placeholder="Buscar por nombre, modelo, color o SKU..." autocomplete="off" value="${searchVal}"/>
        <div class="ln-list hidden absolute left-0 right-0 mt-1 z-10 max-h-64 overflow-y-auto scrollbar-thin bg-white dark:bg-ivory-700 border border-slate-200 dark:border-white/10 rounded-xl shadow-lg"></div>
      </div>
      <div class="ln-picked mt-1 text-xs text-slate-500">${pickedHtml}</div>
      <div class="grid grid-cols-3 gap-2 mt-2 text-sm">
        <div>
          <label class="block text-xs mb-1">Cantidad</label>
          <input class="ln-qty w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10" type="number" min="1" value="${line.qty}"/>
        </div>
        <div>
          <label class="block text-xs mb-1">P. Compra <span class="text-slate-400">(opcional)</span></label>
          <input class="ln-unit w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10" type="number" min="0" step="0.01" placeholder="${placeholder}" value="${line.unitPrice===''?'':line.unitPrice}"/>
        </div>
        <div>
          <label class="block text-xs mb-1">Subtotal</label>
          <div class="ln-sub px-3 py-2 rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 font-semibold">${fmt.format(lineSubtotal(line))}</div>
        </div>
      </div>
    </div>`;
  };

  openModal(`
    <h3 class="text-lg font-semibold mb-4">Nuevo ingreso</h3>
    <p class="text-xs text-slate-500 mb-3">Si dejás el precio vacío, se usa el último precio de compra del producto.</p>
    <div id="ingLines" class="space-y-3"></div>
    <button id="addLine" type="button" class="mt-3 w-full px-3 py-2 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm font-medium">+ Agregar producto</button>

    <div class="flex items-center justify-between mt-4 px-2">
      <div class="text-sm text-slate-500">Total gastado</div>
      <div id="ingTotal" class="text-xl font-bold">${fmt.format(0)}</div>
    </div>

    <div class="mt-3 text-sm">
      <label class="block mb-1">Nota (opcional)</label>
      <input id="mNote" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
    </div>

    <div class="flex justify-end gap-2 mt-5">
      <button id="cancel" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 text-sm">Cancelar</button>
      <button id="save" class="px-4 py-2 rounded-xl bg-ivory-900 hover:bg-ivory-800 text-white text-sm font-medium">Registrar ingreso</button>
    </div>
  `, () => {
    const container = $('#ingLines');
    const totalEl = $('#ingTotal');

    function recalcTotal() {
      const t = lines.reduce((a,l) => a + lineSubtotal(l), 0);
      totalEl.textContent = fmt.format(t);
    }

    function bindLine(line) {
      const row = container.querySelector(`[data-lid="${line.id}"]`);
      if (!row) return;
      const search = row.querySelector('.ln-search');
      const list = row.querySelector('.ln-list');
      const picked = row.querySelector('.ln-picked');
      const qty = row.querySelector('.ln-qty');
      const unit = row.querySelector('.ln-unit');
      const sub = row.querySelector('.ln-sub');
      const remove = row.querySelector('.ln-remove');

      const renderList = (q='') => {
        const needle = q.toLowerCase().trim();
        const matches = state.products
          .filter(p => !needle || (p.name+' '+p.model+' '+(p.color||'')+' '+p.category+' '+(p.sku||'')).toLowerCase().includes(needle))
          .slice(0, 40);
        list.innerHTML = matches.length ? matches.map(p => `
          <button type="button" data-pid="${p.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-ivory-100 dark:hover:bg-white/10 flex items-center gap-2">
            <span class="flex-1 truncate">
              <span class="font-medium">${escapeHtml(p.name)}</span>
              <span class="text-slate-500"> · ${escapeHtml(p.model||'—')}</span>
              ${p.color ? ` · ${colorChip(p.color)}` : ''}
            </span>
            <span class="text-xs text-slate-400">compra ${fmt.format(p.buyPrice)}</span>
          </button>`).join('') : `<div class="px-3 py-2 text-sm text-slate-500">Sin resultados</div>`;
        list.querySelectorAll('[data-pid]').forEach(b => b.onclick = () => pick(b.dataset.pid));
        list.classList.remove('hidden');
      };

      const pick = (id) => {
        const p = state.products.find(x=>x.id===id);
        if (!p) return;
        line.productId = id;
        search.value = productLabel(p);
        unit.placeholder = `Toma ${fmt.format(p.buyPrice)} si lo dejás vacío`;
        picked.innerHTML = `Stock actual: <b>${p.stock}</b> · P. compra actual ${fmt.format(p.buyPrice)} · P. venta ${fmt.format(p.sellPrice)}`;
        list.classList.add('hidden');
        sub.textContent = fmt.format(lineSubtotal(line));
        recalcTotal();
      };

      search.oninput = () => { line.productId = ''; renderList(search.value); };
      search.onfocus = () => renderList(search.value);
      qty.oninput = () => { line.qty = parseInt(qty.value)||0; sub.textContent = fmt.format(lineSubtotal(line)); recalcTotal(); };
      unit.oninput = () => { line.unitPrice = unit.value; sub.textContent = fmt.format(lineSubtotal(line)); recalcTotal(); };
      remove.onclick = () => {
        if (lines.length === 1) return toast('Tiene que haber al menos un producto','err');
        const idx = lines.findIndex(l => l.id === line.id);
        if (idx >= 0) lines.splice(idx,1);
        renderLines();
      };
    }

    function renderLines() {
      container.innerHTML = lines.map((l,i) => lineHtml(l,i)).join('');
      lines.forEach(l => bindLine(l));
      recalcTotal();
    }

    $('#addLine').onclick = () => {
      lines.push({ id: uid(), productId:'', qty:1, unitPrice:'' });
      renderLines();
    };

    document.addEventListener('mousedown', (e) => {
      container.querySelectorAll('.ln-list').forEach(list => {
        if (!list.contains(e.target) && !list.previousElementSibling?.contains(e.target)) list.classList.add('hidden');
      });
    });

    $('#cancel').onclick = closeModal;
    $('#save').onclick = () => {
      const prepared = [];
      for (let i=0; i<lines.length; i++) {
        const l = lines[i];
        const p = state.products.find(x=>x.id===l.productId);
        if (!p) return toast(`Producto ${i+1}: seleccioná un producto`,'err');
        const q = parseInt(l.qty)||0;
        if (q<=0) return toast(`Producto ${i+1}: cantidad inválida`,'err');
        const explicit = l.unitPrice === '' || l.unitPrice === null ? null : parseFloat(l.unitPrice);
        const u = (explicit !== null && isFinite(explicit) && explicit >= 0) ? explicit : p.buyPrice;
        prepared.push({ p, q, u, explicit: explicit !== null && isFinite(explicit) && explicit >= 0 });
      }

      const date = new Date().toISOString();
      const note = $('#mNote').value.trim();
      const movs = [];
      const touched = new Set();
      for (const { p, q, u, explicit } of prepared) {
        const mov = { id: uid(), type:'in', productId:p.id, qty:q, unitCost:u, date, note };
        if (explicit) p.buyPrice = u;
        p.stock += q;
        state.movements.push(mov);
        movs.push(mov);
        touched.add(p.id);
      }
      save(); closeModal(); render();
      toast(`Ingreso registrado · ${movs.length} ${movs.length===1?'producto':'productos'}`);
      if (cloudReady) {
        const ops = [];
        for (const m of movs) ops.push(cloudInsertMovement(m));
        for (const pid of touched) ops.push(cloudUpsertProduct(state.products.find(p=>p.id===pid)));
        Promise.all(ops).catch(e => toast('Error nube: '+e.message,'err'));
      }
    };

    renderLines();
  }, 'lg');
}

        <div class="ln-list hidden absolute left-0 right-0 mt-1 z-10 max-h-64 overflow-y-auto scrollbar-thin bg-white dark:bg-ivory-700 border border-slate-200 dark:border-white/10 rounded-xl shadow-lg"></div>

          <input class="ln-unit w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10" type="number" min="0" step="0.01" value="${line.unitPrice}"/>
        </div>
        <div>
          <label class="block text-xs mb-1">Subtotal</label>
          <div class="ln-sub px-3 py-2 rounded-xl bg-slate-100 dark:bg-white/5 border border-slate-200 dark:border-white/10 font-semibold">${fmt.format(line.qty*line.unitPrice)}</div>

    <div id="saleLines" class="space-y-3"></div>
    <button id="addLine" type="button" class="mt-3 w-full px-3 py-2 rounded-xl bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 text-sm font-medium">+ Agregar producto</button>

    <div class="flex items-center justify-between mt-4 px-2">
      <div class="text-sm text-slate-500">Total</div>
      <div id="saleTotal" class="text-xl font-bold">${fmt.format(0)}</div>
    </div>

    <div class="pt-4 mt-4 border-t border-slate-200 dark:border-white/10">
      <div class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-2">Cliente</div>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="col-span-2">
          <label class="block mb-1">Celular *</label>
          <input id="mPhone" autocomplete="off" placeholder="11 5555-5555" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
          <div id="mCustHint" class="text-xs text-slate-500 mt-1"></div>
        </div>
        <div>
          <label class="block mb-1">Nombre *</label>
          <input id="mFirst" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
        <div>
          <label class="block mb-1">Apellido</label>
          <input id="mLast" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
        </div>
      </div>
    </div>
    <div class="mt-3 text-sm">
      <label class="block mb-1">Nota (opcional)</label>
      <input id="mNote" class="w-full px-3 py-2 rounded-xl bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10"/>
    </div>

    <div class="flex justify-end gap-2 mt-5">
      <button id="cancel" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-white/10 text-sm">Cancelar</button>
      <button id="save" class="px-4 py-2 rounded-xl bg-ivory-500 hover:bg-ivory-700 text-white text-sm font-medium">Registrar venta</button>
    </div>
  `, () => {
    const container = $('#saleLines');
    const totalEl = $('#saleTotal');

    function recalcTotal() {
      const t = lines.reduce((a,l) => a + (parseFloat(l.qty)||0) * (parseFloat(l.unitPrice)||0), 0);
      totalEl.textContent = fmt.format(t);
    }

    function bindLine(line) {
      const row = container.querySelector(`[data-lid="${line.id}"]`);
      if (!row) return;
      const search = row.querySelector('.ln-search');
      const list = row.querySelector('.ln-list');
      const picked = row.querySelector('.ln-picked');
      const qty = row.querySelector('.ln-qty');
      const unit = row.querySelector('.ln-unit');
      const sub = row.querySelector('.ln-sub');
      const remove = row.querySelector('.ln-remove');

      const renderList = (q='') => {
        const needle = q.toLowerCase().trim();
        const matches = state.products
          .filter(p => p.stock > 0)
          .filter(p => !needle || (p.name+' '+p.model+' '+(p.color||'')+' '+p.category+' '+(p.sku||'')).toLowerCase().includes(needle))
          .slice(0, 40);
        list.innerHTML = matches.length ? matches.map(p => `
          <button type="button" data-pid="${p.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-ivory-100 dark:hover:bg-white/10 flex items-center gap-2">
            <span class="flex-1 truncate">
              <span class="font-medium">${escapeHtml(p.name)}</span>
              <span class="text-slate-500"> · ${escapeHtml(p.model||'—')}</span>
              ${p.color ? ` · ${colorChip(p.color)}` : ''}
            </span>
            <span class="text-xs ${p.stock<=state.settings.lowStock?'text-amber-500':'text-slate-400'}">stock ${p.stock}</span>
          </button>`).join('') : `<div class="px-3 py-2 text-sm text-slate-500">Sin productos con stock disponible</div>`;
        list.querySelectorAll('[data-pid]').forEach(b => b.onclick = () => pick(b.dataset.pid));
        list.classList.remove('hidden');
      };

      const warn = row.querySelector('.ln-warn');
      const checkStock = () => {
        const p = state.products.find(x=>x.id===line.productId);
        if (!p) { warn.classList.add('hidden'); return; }
        const usedElsewhere = lines.filter(l => l.id !== line.id && l.productId === p.id).reduce((a,l)=>a+(parseInt(l.qty)||0),0);
        const max = p.stock - usedElsewhere;
        if (line.qty > max) {
          warn.textContent = usedElsewhere>0 ? `Máximo ${max} (ya hay ${usedElsewhere} en otras líneas, stock total ${p.stock})` : `Stock insuficiente · disponible ${p.stock}`;
          warn.classList.remove('hidden');
        } else {
          warn.classList.add('hidden');
        }
      };

      const pick = (id) => {
        const p = state.products.find(x=>x.id===id);
        if (!p) return;
        if (p.stock <= 0) return toast('Ese producto no tiene stock','err');
        line.productId = id;
        line.unitPrice = p.sellPrice;
        unit.value = p.sellPrice;
        search.value = productLabel(p);
        picked.innerHTML = `Stock disponible: <b>${p.stock}</b> · P. compra ${fmt.format(p.buyPrice)} · P. venta ${fmt.format(p.sellPrice)}`;
        qty.max = p.stock;
        list.classList.add('hidden');
        sub.textContent = fmt.format(line.qty * line.unitPrice);
        recalcTotal();
        checkStock();
      };

      search.oninput = () => { line.productId = ''; warn.classList.add('hidden'); renderList(search.value); };
      search.onfocus = () => renderList(search.value);
      qty.oninput = () => {
        const p = state.products.find(x=>x.id===line.productId);
        let v = parseInt(qty.value)||0;
        if (p && v > p.stock) { v = p.stock; qty.value = v; toast(`Máximo disponible: ${p.stock}`,'err'); }
        line.qty = v;
        sub.textContent = fmt.format(line.qty*line.unitPrice);
        recalcTotal();
        checkStock();
      };
      unit.oninput = () => { line.unitPrice = parseFloat(unit.value)||0; sub.textContent = fmt.format(line.qty*line.unitPrice); recalcTotal(); };
      remove.onclick = () => {
        if (lines.length === 1) return toast('Tiene que haber al menos un producto','err');
        const idx = lines.findIndex(l => l.id === line.id);
        if (idx >= 0) lines.splice(idx,1);
        renderLines();
      };
      checkStock();
    }

    function renderLines() {
      container.innerHTML = lines.map((l,i) => lineHtml(l,i)).join('');
      lines.forEach(l => bindLine(l));
      recalcTotal();
    }

    $('#addLine').onclick = () => {
      lines.push({ id: uid(), productId:'', qty:1, unitPrice:0 });
      renderLines();
    };

    document.addEventListener('mousedown', (e) => {
      container.querySelectorAll('.ln-list').forEach(list => {
        if (!list.contains(e.target) && !list.previousElementSibling?.contains(e.target)) list.classList.add('hidden');
      });
    });

    const phone = $('#mPhone'), first = $('#mFirst'), last = $('#mLast'), hint = $('#mCustHint');
    phone.oninput = () => {
      const v = phone.value.trim();
      if (!v) { hint.textContent=''; return; }
      const found = state.customers.find(c => c.phone === v);
      if (found) {
        first.value = found.firstName;
        last.value = found.lastName;
        hint.innerHTML = `<span class="text-emerald-600">Cliente existente: ${escapeHtml(found.firstName)} ${escapeHtml(found.lastName)}</span>`;
      } else {
        hint.innerHTML = `<span class="text-slate-500">Cliente nuevo — se creará al guardar.</span>`;
      }
    };

    $('#cancel').onclick = closeModal;
    $('#save').onclick = () => {
      // Validar líneas
      const prepared = [];
      for (let i=0; i<lines.length; i++) {
        const l = lines[i];
        const p = state.products.find(x=>x.id===l.productId);
        if (!p) return toast(`Producto ${i+1}: seleccioná un producto`,'err');
        const q = parseInt(l.qty)||0;
        const u = parseFloat(l.unitPrice)||0;
        if (q<=0) return toast(`Producto ${i+1}: cantidad inválida`,'err');
        if (q > p.stock) return toast(`${p.name}: stock insuficiente (disp. ${p.stock})`,'err');
        prepared.push({ p, q, u });
      }
      // Agrupar mismo producto para sumar cantidades y validar stock total
      const usage = new Map();
      for (const it of prepared) usage.set(it.p.id, (usage.get(it.p.id)||0) + it.q);
      for (const [pid, total] of usage) {
        const p = state.products.find(x=>x.id===pid);
        if (total > p.stock) return toast(`${p.name}: stock insuficiente total (pediste ${total}, hay ${p.stock})`,'err');
      }

      // Cliente
      const phoneV = phone.value.trim();
      const firstV = first.value.trim();
      const lastV  = last.value.trim();
      if (!phoneV) return toast('El celular del cliente es obligatorio','err');
      if (!firstV) return toast('El nombre del cliente es obligatorio','err');
      let customer = state.customers.find(c => c.phone === phoneV);
      if (customer) {
        if (firstV && firstV !== customer.firstName) customer.firstName = firstV;
        if (lastV && lastV !== customer.lastName) customer.lastName = lastV;
      } else {
        customer = { id: uid(), firstName: firstV, lastName: lastV, phone: phoneV, createdAt: new Date().toISOString() };
        state.customers.push(customer);
      }

      const date = new Date().toISOString();
      const note = $('#mNote').value.trim();
      const movs = [];
      for (const { p, q, u } of prepared) {
        const mov = { id: uid(), type:'out', productId:p.id, qty:q, unitPrice:u, unitCost:p.buyPrice, date, note, customerId: customer.id };
        p.stock -= q;
        state.movements.push(mov);
        movs.push(mov);
      }
      save(); closeModal(); render();
      toast(`Venta registrada · ${movs.length} ${movs.length===1?'producto':'productos'}`);
      if (cloudReady) {
        const ops = [cloudUpsertCustomer(customer)];
        for (const m of movs) ops.push(cloudInsertMovement(m));
        for (const pid of new Set(prepared.map(x => x.p.id))) ops.push(cloudUpsertProduct(state.products.find(p=>p.id===pid)));
        Promise.all(ops).catch(e => toast('Error nube: '+e.message,'err'));
      }
    };

    renderLines();
  }, 'lg');
}

// =====================================================================
//  Export / Import
// =====================================================================
function downloadFile(name, content, type='text/plain') {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
function toCSV(rows) {
  return rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
}
function exportCategory(cat) {
  const items = state.products.filter(p=>p.category===cat);
  const rows = [['nombre','categoria','modelo','color','stock','precio_compra','precio_venta','sku']];
  items.forEach(p => rows.push([p.name,p.category,p.model,p.color||'',p.stock,p.buyPrice,p.sellPrice,p.sku]));
  downloadFile(`ivoryx-${cat.toLowerCase()}.csv`, toCSV(rows), 'text/csv');
}
function exportMovements() {
  const rows = [['fecha','tipo','producto','categoria','modelo','cantidad','unitario','total','nota']];
  state.movements.forEach(m => {
    const p = state.products.find(pp=>pp.id===m.productId);
    const unit = m.type==='out' ? (m.unitPrice||0) : (m.unitCost||0);
    rows.push([m.date, m.type, p?.name||'', p?.category||'', p?.model||'', m.qty, unit, unit*m.qty, m.note||'']);
  });
  downloadFile('ivoryx-movimientos.csv', toCSV(rows), 'text/csv');
}
function backup() {
  downloadFile(`ivoryx-backup-${todayKey()}.json`, JSON.stringify(state,null,2), 'application/json');
}
function importBackup(file) {
  const r = new FileReader();
  r.onload = () => { try { state = JSON.parse(r.result); save(); render(); toast('Backup restaurado'); } catch { toast('JSON inválido','err'); } };
  r.readAsText(file);
}
function importCsv(file) {
  const r = new FileReader();
  r.onload = () => {
    const lines = r.result.split(/\r?\n/).filter(Boolean);
    const header = lines.shift().toLowerCase().split(',');
    const idx = k => header.indexOf(k);
    let added = 0;
    lines.forEach(line => {
      const cells = line.match(/("([^"]|"")*"|[^,]*)(,|$)/g)?.map(c => c.replace(/,$/,'').replace(/^"|"$/g,'').replace(/""/g,'"')) || [];
      const name = cells[idx('nombre')];
      if (!name) return;
      state.products.push({
        id: uid(),
        name,
        category: cells[idx('categoria')] || 'Otros',
        model: cells[idx('modelo')] || '',
        color: cells[idx('color')] || '',
        stock: parseInt(cells[idx('stock')])||0,
        buyPrice: parseFloat(cells[idx('precio_compra')])||0,
        sellPrice: parseFloat(cells[idx('precio_venta')])||0,
        sku: cells[idx('sku')] || '',
        createdAt: new Date().toISOString(),
      });
      added++;
    });
    save(); render(); toast(`${added} productos importados`);
  };
  r.readAsText(file);
}

// =====================================================================
//  Render & Event delegation
// =====================================================================
function render() {
  // Theme
  document.documentElement.classList.toggle('dark', state.settings.theme==='dark');

  renderNav();

  const titles = { dashboard:'Dashboard', movements:'Historial de movimientos', stats:'Estadísticas', settings:'Configuración' };
  let html = '';
  if (currentRoute==='dashboard') { $('#pageTitle').textContent = 'Dashboard'; html = viewDashboard(); }
  else if (currentRoute==='customers') { $('#pageTitle').textContent = 'Clientes'; html = viewCustomers(); }
  else if (currentRoute==='movements') { $('#pageTitle').textContent = titles.movements; html = viewMovements(); }
  else if (currentRoute==='stats') { $('#pageTitle').textContent = titles.stats; html = viewStats(); }
  else if (currentRoute==='settings') { $('#pageTitle').textContent = titles.settings; html = viewSettings(); }
  else if (currentRoute.startsWith('category:')) {
    const cat = currentRoute.split(':')[1];
    $('#pageTitle').textContent = cat;
    html = viewCategory(cat);
  }
  else if (currentRoute.startsWith('model:')) {
    const parts = currentRoute.split(':');
    const cat = parts[1];
    const model = parts.slice(2).join(':');
    $('#pageTitle').textContent = `${cat} · ${model}`;
    html = viewModelDetail(cat, model);
  }
  $('#view').innerHTML = html;

  bindViewEvents();
}

function bindViewEvents() {
  // Quick actions / data-action
  $$('#view [data-action]').forEach(b => {
    b.onclick = () => {
      const a = b.dataset.action;
      const id = b.dataset.id;
      const cat = b.dataset.category;
      if (a==='new-product') productForm(null, cat);
      else if (a==='edit') productForm(state.products.find(p=>p.id===id));
      else if (a==='delete') {
        if (confirm('¿Eliminar este producto? Los movimientos asociados también se borrarán.')) {
          state.products = state.products.filter(p=>p.id!==id);
          state.movements = state.movements.filter(m=>m.productId!==id);
          save(); render(); toast('Producto eliminado');
          if (cloudReady) cloudDeleteProduct(id).catch(e => toast('Error nube: '+e.message,'err'));
        }
      }
      else if (a==='add-stock') addStockForm(id);
      else if (a==='new-sale') saleForm();
      else if (a==='new-inbound') ingresoForm();
      else if (a==='seed-fundas') seedFundasForm();
      else if (a==='bulk-price') {
        const kind = b.dataset.bulk; // 'silicona' | 'magsafe'
        const targets = state.products.filter(p => p.category==='Fundas' && (kind==='magsafe' ? isFundaMagsafe(p) : !isFundaMagsafe(p)));
        if (!targets.length) return toast('No hay fundas '+(kind==='magsafe'?'MagSafe':'de silicona'),'info');
        const sample = targets[0].buyPrice;
        const same = targets.every(p => p.buyPrice === sample);
        const hint = same ? `Actual: ${fmt.format(sample)}` : 'Precios mixtos';
        const v = prompt(`Nuevo precio de compra para ${targets.length} fundas ${kind==='magsafe'?'MagSafe (Transparentes)':'de Silicona'} en TODOS los modelos.\n${hint}\n\nIngresá el nuevo precio:`);
        if (v === null) return;
        const newPrice = parseFloat(v);
        if (!isFinite(newPrice) || newPrice < 0) return toast('Precio inválido','err');
        targets.forEach(p => p.buyPrice = newPrice);
        save(); render(); toast(`${targets.length} fundas actualizadas`);
        if (cloudReady) Promise.all(targets.map(cloudUpsertProduct)).catch(e => toast('Error nube: '+e.message,'err'));
      }
      else if (a==='export-cat') exportCategory(cat);
      else if (a==='export-mov') exportMovements();
      else if (a==='backup') backup();
      else if (a==='new-customer') customerForm(null);
      else if (a==='edit-customer') customerForm(state.customers.find(c=>c.id===id));
      else if (a==='view-customer') viewCustomerHistory(id);
      else if (a==='delete-customer') {
        if (confirm('¿Eliminar este cliente? Las ventas mantienen el registro pero quedan sin cliente asociado.')) {
          state.customers = state.customers.filter(c=>c.id!==id);
          state.movements.forEach(m => { if (m.customerId===id) m.customerId = null; });
          save(); render(); toast('Cliente eliminado');
          if (cloudReady) cloudDeleteCustomer(id).catch(e => toast('Error nube: '+e.message,'err'));
        }
      }
      else if (a==='reset') {
        if (confirm('Borrar TODOS los datos. ¿Continuar?')) {
          state = defaultState(); save(); render(); toast('Datos reseteados');
        }
      }
      else if (a==='reset-all') {
        const typed = prompt('Esto eliminará TODOS los productos, movimientos, clientes y reiniciará la configuración.\n\nEscribí BORRAR para confirmar:');
        if (typed && typed.trim().toUpperCase() === 'BORRAR') {
          state = defaultState();
          save();
          listFilters = { q:'', lowOnly:false, color:'' };
          movFilters = { from:'', to:'', productId:'', category:'', type:'' };
          customerQuery = '';
          render();
          toast('Todos los datos fueron eliminados');
        } else if (typed !== null) {
          toast('Confirmación incorrecta. No se borró nada.','err');
        }
      }
    };
  });
  $$('#view [data-go]').forEach(b => b.onclick = () => navigate(b.dataset.go));

  // Model card click → drill-down
  $$('#view .model-card[data-model]').forEach(b => b.onclick = () => {
    const cat = currentRoute.split(':')[1];
    navigate(`model:${cat}:${b.dataset.model}`);
  });

  // Category filters
  const cs = $('#catSearch'); if (cs) cs.oninput = e => { listFilters.q = e.target.value; render(); cs.focus(); };
  const lo = $('#lowOnly'); if (lo) lo.onchange = e => { listFilters.lowOnly = e.target.checked; render(); };
  $$('#view [data-color-filter]').forEach(b => b.onclick = () => { listFilters.color = b.dataset.colorFilter; render(); });
  const cuS = $('#custSearch'); if (cuS) cuS.oninput = e => { customerQuery = e.target.value; render(); cuS.focus(); };

  // Movements filters
  const bind = (id, key) => { const el=$('#'+id); if (el) el.onchange = e => { movFilters[key]=e.target.value; render(); }; };
  bind('movFrom','from'); bind('movTo','to'); bind('movType','type'); bind('movCategory','category'); bind('movProduct','productId');

  // Settings
  const ss = $('#saveSettings'); if (ss) ss.onclick = () => {
    state.settings.business = $('#setBusiness').value;
    state.settings.lowStock = parseInt($('#setLow').value)||0;
    state.settings.criticalStock = parseInt($('#setCrit').value)||0;
    save(); render(); toast('Configuración guardada');
  };
  const fb = $('#fileBackup'); if (fb) fb.onchange = e => e.target.files[0] && importBackup(e.target.files[0]);
  const fc = $('#fileCsv'); if (fc) fc.onchange = e => e.target.files[0] && importCsv(e.target.files[0]);

  // Supabase
  const connect = $('#connectSupa'); if (connect) connect.onclick = async () => {
    const url = $('#setSupaUrl').value.trim();
    const key = $('#setSupaKey').value.trim();
    if (!url || !key) return toast('Completá URL y key','err');
    saveCfg({ url, key });
    if (!initSupabase()) return toast('SDK Supabase no cargado','err');
    try {
      const data = await cloudLoad();
      if (data.products.length === 0 && data.movements.length === 0 && state.products.length > 0) {
        if (confirm('La nube está vacía. ¿Subir los datos locales ahora?')) await pushAll();
      } else {
        state.products = data.products; state.movements = data.movements; state.customers = data.customers; save();
      }
      render(); toast('Conectado a Supabase ✨');
    } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const push = $('#pushSupa'); if (push) push.onclick = async () => {
    if (!cloudReady) return toast('Conectá primero','err');
    if (!confirm('Esto sobreescribe los datos en la nube con los locales. ¿Continuar?')) return;
    try { await pushAll(); toast('Datos subidos'); } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const pull = $('#pullSupa'); if (pull) pull.onclick = async () => {
    if (!cloudReady) return toast('Conectá primero','err');
    try {
      const data = await cloudLoad();
      state.products = data.products; state.movements = data.movements; state.customers = data.customers;
      const changed = migratePlateado(state.products);
      save(); render();
      toast('Datos descargados');
      if (changed.length) {
        try { await Promise.all(changed.map(cloudUpsertProduct)); toast(`Migrados ${changed.length} colores`,'ok'); }
        catch (e) { toast('Error subiendo migración: '+e.message,'err'); }
      }
    } catch (e) { toast('Error: '+e.message,'err'); }
  };
  const disc = $('#disconnectSupa'); if (disc) disc.onclick = () => {
    clearCfg(); supa=null; cloudReady=false; render(); toast('Desconectado');
  };
  const wipe = $('#wipeSupa'); if (wipe) wipe.onclick = async () => {
    if (!cloudReady) return toast('Conectá primero','err');
    const typed = prompt('Esto BORRA todos los productos, movimientos y clientes de Supabase.\nLos datos locales no se tocan.\n\nEscribí BORRAR para confirmar:');
    if (!typed || typed.trim().toUpperCase() !== 'BORRAR') {
      if (typed !== null) toast('Confirmación incorrecta. No se borró nada.','err');
      return;
    }
    try {
      // Orden: movimientos → productos → clientes (por FKs)
      const r1 = await supa.from('movements').delete().not('id','is',null);
      if (r1.error) throw r1.error;
      const r2 = await supa.from('products').delete().not('id','is',null);
      if (r2.error) throw r2.error;
      const r3 = await supa.from('customers').delete().not('id','is',null);
      if (r3.error && r3.error.code !== '42P01') throw r3.error;
      toast('Datos de la nube eliminados','ok');
    } catch (e) {
      toast('Error: '+e.message,'err');
    }
  };
}

async function pushAll() {
  if (!cloudReady) return;
  if (state.customers.length) {
    const { error } = await supa.from('customers').upsert(state.customers.map(customerToRow));
    if (error) throw error;
  }
  if (state.products.length) {
    const { error } = await supa.from('products').upsert(state.products.map(productToRow));
    if (error) throw error;
  }
  if (state.movements.length) {
    const { error } = await supa.from('movements').upsert(state.movements.map(movToRow));
    if (error) throw error;
  }
}

// Topbar bindings
$('#btnTheme').onclick = () => { state.settings.theme = state.settings.theme==='dark'?'light':'dark'; save(); render(); };
$('#btnSettings').onclick = () => navigate('settings');
$('#btnMobileNav').onclick = () => $('#sidebar').classList.toggle('hidden');
$('#globalSearch').oninput = e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) return;
  const hit = state.products.find(p => (p.name+p.model+p.sku).toLowerCase().includes(q));
  if (hit) { navigate('category:'+hit.category); listFilters.q = q; render(); }
};

// Init
if (location.hash) { try { currentRoute = decodeURI(location.hash.slice(1)); } catch { currentRoute = location.hash.slice(1); } }
initSupabase();
render();

(async () => {
  if (!cloudReady) return;
  try {
    const data = await cloudLoad();
    if (data) {
      state.products = data.products;
      state.movements = data.movements;
      state.customers = data.customers;
      const changed = migratePlateado(state.products);
      save();
      render();
      toast('Sincronizado con Supabase ✨','ok');
      if (changed.length) {
        try {
          await Promise.all(changed.map(cloudUpsertProduct));
          toast(`Migrados ${changed.length} colores Plateado → Otros en la nube`,'ok');
        } catch (e) { toast('Error subiendo migración: '+e.message,'err'); }
      }
    }
  } catch (e) {
    console.error(e);
    toast('No se pudo conectar a Supabase: '+(e.message||e),'err');
  }
})();
</script>
</body>
</html>
